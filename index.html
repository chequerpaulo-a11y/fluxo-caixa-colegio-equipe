function mkey(y,m){return y+'-'+(m+1<10?'0':'')+(m+1)}

function getStatus(c){
  if(c.pago)return'pago';
  var h=today();
  if(c.vencimento<h)return'atrasado';
  var d5=new Date();d5.setDate(d5.getDate()+5);
  if(c.vencimento<=d5.toISOString().split('T')[0])return'vence';
  return'pendente';
}

// Saldo de uma conta bancГЎria
function getSaldoBanco(bancoId){
  var banco=bancos.find(function(b){return b.id===bancoId});
  var saldoInicial=banco?banco.saldoInicial||0:0;
  var movs=entries.filter(function(e){return e.conta===bancoId});
  var rec=movs.filter(function(e){return e.tipo==='entrada'}).reduce(function(a,e){return a+e.valor},0);
  var des=movs.filter(function(e){return e.tipo==='saida'}).reduce(function(a,e){return a+e.valor},0);
  return saldoInicial+rec-des;
}

function rDash(){
  var c=calc(curY,curM),es=getEs(curY,curM),res=c.rec-c.des;
  var labs=[],rA=[],dA=[];
  for(var i=5;i>=0;i--){var m=curM-i,y=curY;while(m<0){m+=12;y--}var cc=calc(y,m);labs.push(MONTHS[m].slice(0,3));rA.push(cc.rec);dA.push(cc.des)}
  var rcc={},dcc={};
  for(var j=0;j<es.length;j++){if(es[j].tipo==='entrada')rcc[es[j].cc]=(rcc[es[j].cc]||0)+es[j].valor;else if(es[j].tipo==='saida')dcc[es[j].cc]=(dcc[es[j].cc]||0)+es[j].valor}
  var rT=0,dT=0;for(var k in rcc)rT+=rcc[k];for(var k in dcc)dT+=dcc[k];
  var topR=Object.entries(rcc).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
  var topD=Object.entries(dcc).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
  var l8=[].concat(entries).sort(function(a,b){return(b.ts||0)-(a.ts||0)}).slice(0,8);
  var eC=es.filter(function(e){return e.tipo==='entrada'}).length,sC=es.filter(function(e){return e.tipo==='saida'}).length;
  var aPagar=contas.filter(function(c){return c.tipo==='pagar'&&!c.pago}).reduce(function(a,c){return a+c.valor},0);
  var aRec=contas.filter(function(c){return c.tipo==='receber'&&!c.pago}).reduce(function(a,c){return a+c.valor},0);
  function ccP(items,total,col){if(!items.length)return'<div class="empty"><div>рџ“Љ</div>Sem dados</div>';return items.map(function(x){var p=total>0?(x[1]/total*100).toFixed(0):0;return'<div class="pr"><div class="pi"><span style="color:#94a3b8">'+x[0]+'</span><span style="font-weight:600;color:'+col+'">'+fmt(x[1])+'</span></div><div class="pb"><div class="pf" style="width:'+p+'%;background:'+col+'"></div></div></div>'}).join('')}

  // Bancos grid
  var bancosH=bancos.length?bancos.map(function(b){
    var sal=getSaldoBanco(b.id);

  }).join(''):'<div style="color:#64748b;font-size:13px">Nenhuma conta cadastrada. <span style="color:#60a5fa;cursor:pointer" onclick="goTo(\'contas-bancarias\')">Adicionar в†’</span></div>';

  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>Dashboard</h2><p>VisГЈo executiva do caixa</p></div>'+mnHTML()+'</div>'+
  alertasHTML()+
  '<div class="sg">'+
  '<div class="sc" style="border-top-color:#2563eb"><div class="sl">Saldo Inicial</div><div class="sv">'+fmt(c.si)+'</div><div class="ss">InГ­cio do mГЄs</div></div>'+
  '<div class="sc" style="border-top-color:#10b981"><div class="sl">Total Receitas</div><div class="sv ap">'+fmt(c.rec)+'</div><div class="ss">'+eC+' lanГ§amentos</div></div>'+
  '<div class="sc" style="border-top-color:#ef4444"><div class="sl">Total Despesas</div><div class="sv an">'+fmt(c.des)+'</div><div class="ss">'+sC+' lanГ§amentos</div></div>'+
  '<div class="sc" style="border-top-color:#f59e0b"><div class="sl">Saldo Final</div><div class="sv '+(c.sf>=0?'ap':'an')+'">'+fmt(c.sf)+'</div><div class="ss">'+(res>=0?'в–І +':'в–ј ')+fmt(Math.abs(res))+'</div></div>'+
  '</div>'+
  '<div class="card"><div class="ch"><div class="ct">Saldo por Conta BancГЎria</div><button class="btn bts sm" onclick="goTo(\'contas-bancarias\')">Gerenciar</button></div><div class="cb"><div class="contas-grid">'+bancosH+'</div></div></div>'+
  '<div class="g2"><div class="sc" style="border-top-color:#ef4444;cursor:pointer" onclick="goTo(\'apagar\')"><div class="sl">A Pagar (pendente)</div><div class="sv an">'+fmt(aPagar)+'</div><div class="ss">Clique para ver</div></div>'+
  '<div class="sc" style="border-top-color:#10b981;cursor:pointer" onclick="goTo(\'areceber\')"><div class="sl">A Receber (pendente)</div><div class="sv ap">'+fmt(aRec)+'</div><div class="ss">Clique para ver</div></div></div>'+
  '<div class="g3">'+
  '<div class="card" style="margin:0"><div class="ch"><div><div class="ct">EvoluГ§ГЈo Mensal</div><div class="cs">Гљltimos 6 meses</div></div></div><div class="cb"><canvas id="ch-ev" height="200"></canvas></div></div>'+
  '<div class="card" style="margin:0"><div class="ch"><div class="ct">Receitas por Centro</div></div><div class="cb">'+ccP(topR,rT,'#10b981')+'</div></div>'+

  '</div>'+

  '<table><thead><tr><th>Data</th><th>DescriГ§ГЈo</th><th>Centro</th><th>Conta</th><th>UsuГЎrio</th><th>Tipo</th><th class="tr2">Valor</th></tr></thead>'+
  '<tbody>'+(l8.length?l8.map(function(e){return rowH(e,false)}).join(''):emptyR(7,'Nenhum lanГ§amento ainda'))+'</tbody></table></div>';
  mkChart('ch-ev',labs,rA,dA,'bar');
}

function openModalBanco(id){
  editBancoId=id||null;
  if(id){
    var b=bancos.find(function(x){return x.id===id});
    if(!b)return;
    document.getElementById('mb2-title').textContent='Editar Conta';
    document.getElementById('bc-nome').value=b.nome;
    document.getElementById('bc-tipo').value=b.tipo;
    document.getElementById('bc-cor').value=b.cor;
    document.getElementById('bc-saldo').value=b.saldoInicial||0;
    document.getElementById('bc-data').value=b.dataInicial||today();
  } else {
    document.getElementById('mb2-title').textContent='Nova Conta BancГЎria';
    document.getElementById('bc-nome').value='';
    document.getElementById('bc-saldo').value='0';
    document.getElementById('bc-data').value=today();
  }
  document.getElementById('modal-banco').classList.add('on');
}
function closeModalBanco(){document.getElementById('modal-banco').classList.remove('on');editBancoId=null}
function editBanco(id){openModalBanco(id)}

function saveBanco(){
  var nome=document.getElementById('bc-nome').value.trim(),tipo=document.getElementById('bc-tipo').value,cor=document.getElementById('bc-cor').value,saldoInicial=parseFloat(document.getElementById('bc-saldo').value)||0,dataInicial=document.getElementById('bc-data').value;
  if(!nome){showToast('Digite o nome da conta','er');return}
  var data={nome:nome,tipo:tipo,cor:cor,saldoInicial:saldoInicial,dataInicial:dataInicial};
  if(editBancoId){db.collection('bancos').doc(editBancoId).update(data);}
  else{data.ts=Date.now();db.collection('bancos').add(data);}
  closeModalBanco();showToast(editBancoId?'Conta atualizada!':'Conta criada!');
}
function delBanco(id){if(!confirm('Remover esta conta? Os lanГ§amentos vinculados nГЈo serГЈo excluГ­dos.'))return;db.collection('bancos').doc(id).delete();showToast('Removido')}

  '<tbody>'+(es.length?es.map(function(e){
    var d=e.date?e.date.split('-').reverse().join('/'):'';
    var uc=e.usuario==='Paulo'?'#60a5fa':'#a78bfa';
    var col=tipo==='entrada'?'ap':'an';

    document.getElementById('f-us').value=curUser;
    document.getElementById('ft-dt').value=today();
    document.getElementById('ft-vl').value='';
    document.getElementById('ft-ds').value='';
    document.getElementById('ft-ob').value='';
  }
  document.getElementById('modal').classList.add('on');
}

function closeModal(){document.getElementById('modal').classList.remove('on');editId=null}

function saveEntry(){
  if(selTipo==='transferencia'){
    var dt=document.getElementById('ft-dt').value,vl=parseFloat(document.getElementById('ft-vl').value),ds=document.getElementById('ft-ds').value.trim(),ob=document.getElementById('ft-ob').value,us=document.getElementById('ft-us').value,orig=document.getElementById('ft-origem').value,dest=document.getElementById('ft-destino').value;
    if(!dt||isNaN(vl)||vl<=0){showToast('Preencha data e valor','er');return}
    if(orig===dest){showToast('Origem e destino nГЈo podem ser iguais','er');return}
    var desc=ds||(nomeBanco(orig)+' в†’ '+nomeBanco(dest));
    if(editId){
      db.collection('entries').doc(editId).update({tipo:'transferencia',date:dt,valor:vl,desc:desc,conta:orig,contaOrigem:orig,contaDestino:dest,usuario:us,obs:ob,ts:Date.now()});
      closeModal();showToast('TransferГЄncia atualizada!');return;
    }
    db.collection('entries').add({tipo:'saida',date:dt,valor:vl,desc:desc,cc:'TransferГЄncia entre contas',conta:orig,contaOrigem:orig,contaDestino:dest,usuario:us,pagamento:'TransferГЄncia',obs:ob,ts:Date.now()});
    db.collection('entries').add({tipo:'entrada',date:dt,valor:vl,desc:desc,cc:'TransferГЄncia entre contas',conta:dest,contaOrigem:orig,contaDestino:dest,usuario:us,pagamento:'TransferГЄncia',obs:ob,ts:Date.now()+1});
    closeModal();showToast('TransferГЄncia registrada!');return;
  }
  var data=document.getElementById('f-dt').value,valor=parseFloat(document.getElementById('f-vl').value),desc=document.getElementById('f-ds').value.trim(),cc=document.getElementById('f-cc').value,conta=document.getElementById('f-conta').value,usuario=document.getElementById('f-us').value,pagamento=document.getElementById('f-pg').value,obs=document.getElementById('f-ob').value;
  if(!data||isNaN(valor)||valor<=0||!desc){showToast('Preencha data, descriГ§ГЈo e valor','er');return}
  var payload={tipo:selTipo,date:data,valor:valor,desc:desc,cc:cc,conta:conta,usuario:usuario,pagamento:pagamento,obs:obs,ts:Date.now()};
  if(editId){db.collection('entries').doc(editId).update(payload);closeModal();showToast('LanГ§amento atualizado!');}
  else{db.collection('entries').add(payload);closeModal();showToast((selTipo==='entrada'?'Receita':'Despesa')+' lanГ§ada!');}
}
function delE(id){if(!confirm('Remover?'))return;db.collection('entries').doc(id).delete();showToast('Removido')}

// в”Ђв”Ђ CONTAS A PAGAR / RECEBER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function rContas(tipo){
  contaTipo=tipo;var isPagar=tipo==='pagar';
  var lista=contas.filter(function(c){return c.tipo===tipo});
  if(filtro!=='todos')lista=lista.filter(function(c){return getStatus(c)===filtro});
  var totPend=contas.filter(function(c){return c.tipo===tipo&&!c.pago}).reduce(function(a,c){return a+c.valor},0);
  var totPago=contas.filter(function(c){return c.tipo===tipo&&c.pago}).reduce(function(a,c){return a+(c.valorPago||c.valor)},0);
  var totAtras=contas.filter(function(c){return c.tipo===tipo&&getStatus(c)==='atrasado'}).reduce(function(a,c){return a+c.valor},0);
  function stTag(c){var s=getStatus(c);if(s==='pago')return'<span class="tg tg-pago">вњ“ Pago</span>';if(s==='atrasado')return'<span class="tg tg-atras">Atrasado</span>';if(s==='vence')return'<span class="tg tg-vence">Vence em breve</span>';return'<span class="tg tg-pend">Pendente</span>';}
  function rCls(c){var s=getStatus(c);return s==='atrasado'?' class="row-atras"':s==='vence'?' class="row-vence"':'';}
  var rows=lista.length?lista.map(function(c){
    var d=c.vencimento?c.vencimento.split('-').reverse().join('/'):'вЂ”';
    var dp=c.dataPago?c.dataPago.split('-').reverse().join('/'):'вЂ”';
    var fix=c.fixa?'<span class="tg tg-fix" style="margin-right:4px">Fixa</span>':'';
    var btns=c.pago?'<button class="btn btd sm" onclick="delConta(\''+c.id+'\')">Г—</button>':'<button class="btn btg sm" style="margin-right:4px" onclick="openBaixa(\''+c.id+'\')">вњ“ Baixa</button><button class="btn btd sm" onclick="delConta(\''+c.id+'\')">Г—</button>';
    return'<tr'+rCls(c)+'><td>'+fix+'<span style="color:#e2e8f0;font-weight:500">'+c.desc+'</span></td><td>'+(c.cc||'вЂ”')+'</td><td>'+d+'</td><td class="tr2"><span class="'+(isPagar?'an':'ap')+'">'+(isPagar?'-':'+')+fmt(c.valor)+'</span></td><td>'+stTag(c)+'</td><td style="font-size:12px;color:#64748b">'+(c.pago?dp+'<br>'+fmt(c.valorPago||c.valor):'вЂ”')+'</td><td>'+btns+'</td></tr>';
  }).join(''):emptyR(7,'Nenhuma conta cadastrada');
  var fbtns=['todos','pendente','atrasado','vence','pago'].map(function(f){var lb={todos:'Todos',pendente:'Pendentes',atrasado:'Atrasados',vence:'Vence em breve',pago:'Pagos'};return'<button class="fbtn'+(filtro===f?' on':'')+'" onclick="setFiltro(\''+f+'\')">'+lb[f]+'</button>'}).join('');
  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>'+(isPagar?'Contas a Pagar':'Contas a Receber')+'</h2><p>'+(isPagar?'Gerencie seus pagamentos':'Gerencie seus recebimentos')+'</p></div>'+
  '<button class="btn btp sm" onclick="openModalConta(\''+tipo+'\')">+ Nova Conta</button></div>'+
  alertasHTML()+
  '<div class="sg3"><div class="sc" style="border-top-color:#f59e0b"><div class="sl">Pendente</div><div class="sv aw">'+fmt(totPend)+'</div></div>'+
  '<div class="sc" style="border-top-color:'+(isPagar?'#ef4444':'#10b981')+'"><div class="sl">'+(isPagar?'Total Pago':'Total Recebido')+'</div><div class="sv '+(isPagar?'an':'ap')+'">'+fmt(totPago)+'</div></div>'+
  '<div class="sc" style="border-top-color:#ef4444"><div class="sl">Em Atraso</div><div class="sv an">'+fmt(totAtras)+'</div></div></div>'+
  '<div class="fbar">'+fbtns+'</div>'+
  '<div class="card"><table><thead><tr><th>DescriГ§ГЈo</th><th>Centro</th><th>Vencimento</th><th class="tr2">Valor</th><th>Status</th><th>Baixa</th><th></th></tr></thead>'+
  '<tbody>'+rows+'</tbody></table></div>';
}

// в”Ђв”Ђ INADIMPLГЉNCIA в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function rInadimplencia(){
  var atras=contas.filter(function(c){return getStatus(c)==='atrasado'});
  var pg=atras.filter(function(c){return c.tipo==='pagar'}),rc=atras.filter(function(c){return c.tipo==='receber'});
  var tP=pg.reduce(function(a,c){return a+c.valor},0),tR=rc.reduce(function(a,c){return a+c.valor},0);
  var h=today();
  function mkR(lista){if(!lista.length)return'<tr><td colspan="5"><div class="empty"><div>вњ…</div>Nenhuma em atraso</div></td></tr>';return lista.map(function(c){var d=c.vencimento?c.vencimento.split('-').reverse().join('/'):'вЂ”';var dias=Math.floor((new Date(h)-new Date(c.vencimento))/864e5);return'<tr class="row-atras"><td style="color:#e2e8f0;font-weight:500">'+c.desc+'</td><td>'+(c.cc||'вЂ”')+'</td><td>'+d+'</td><td style="color:#ef4444;font-size:11px;font-weight:700">'+dias+' dia'+(dias>1?'s':'')+'</td><td class="tr2 an">'+fmt(c.valor)+'</td></tr>'}).join('')}
  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>InadimplГЄncia</h2><p>Contas em atraso</p></div></div>'+
  '<div class="g2"><div class="sc" style="border-top-color:#ef4444"><div class="sl">Pagamentos em Atraso</div><div class="sv an">'+fmt(tP)+'</div><div class="ss">'+pg.length+' conta(s)</div></div>'+
  '<div class="sc" style="border-top-color:#f59e0b"><div class="sl">Recebimentos em Atraso</div><div class="sv aw">'+fmt(tR)+'</div><div class="ss">'+rc.length+' conta(s)</div></div></div>'+
  '<div class="card"><div class="ch"><div class="ct">Pagamentos Atrasados</div><span class="bdg bdg-s">'+pg.length+'</span></div><table><thead><tr><th>DescriГ§ГЈo</th><th>Centro</th><th>Vencimento</th><th>Atraso</th><th class="tr2">Valor</th></tr></thead><tbody>'+mkR(pg)+'</tbody></table></div>'+
  '<div class="card"><div class="ch"><div class="ct">Recebimentos Atrasados</div><span class="bdg bdg-e">'+rc.length+'</span></div><table><thead><tr><th>DescriГ§ГЈo</th><th>Centro</th><th>Vencimento</th><th>Atraso</th><th class="tr2">Valor</th></tr></thead><tbody>'+mkR(rc)+'</tbody></table></div>';
}

// в”Ђв”Ђ DFC в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function rDFC(){
  var c=calc(curY,curM),es=getEs(curY,curM),res=c.rec-c.des;
  var rcc={},dcc={};
  centros.entrada.forEach(function(x){rcc[x]=0});centros.saida.forEach(function(x){dcc[x]=0});
  es.forEach(function(e){if(e.tipo==='entrada')rcc[e.cc]=(rcc[e.cc]||0)+e.valor;else if(e.tipo==='saida')dcc[e.cc]=(dcc[e.cc]||0)+e.valor});
  var h='<tbody><tr><td style="padding:13px 14px;font-size:14px;font-weight:700;color:#e2e8f0">Saldo Inicial do MГЄs</td><td style="padding:13px 14px;text-align:right;font-size:15px;font-weight:700;color:#60a5fa">'+fmt(c.si)+'</td></tr><tr class="dsh"><td colspan="2">1. Receitas</td></tr>';
  centros.entrada.forEach(function(cc){var v=rcc[cc]||0;h+='<tr class="dit"><td>'+cc+'</td><td style="text-align:right;color:'+(v>0?'#10b981':'#64748b')+'">'+fmt(v)+'</td></tr>'});
  h+='<tr class="dst"><td>Total de Receitas</td><td class="tr2 ap">'+fmt(c.rec)+'</td></tr><tr class="dsh"><td colspan="2">2. Despesas</td></tr>';
  centros.saida.forEach(function(cc){var v=dcc[cc]||0;h+='<tr class="dit"><td>'+cc+'</td><td style="text-align:right;color:'+(v>0?'#ef4444':'#64748b')+'">'+fmt(v)+'</td></tr>'});
  h+='<tr class="dst"><td>Total de Despesas</td><td class="tr2 an">'+fmt(c.des)+'</td></tr><tr class="dsh"><td colspan="2">3. Resultado</td></tr><tr class="dit"><td>Receitas - Despesas</td><td style="text-align:right;color:'+(res>=0?'#10b981':'#ef4444')+'">'+(res>=0?'+':'')+fmt(res)+'</td></tr><tr class="dtot"><td>Saldo Final do MГЄs</td><td style="text-align:right;color:'+(c.sf>=0?'#10b981':'#ef4444')+'">'+fmt(c.sf)+'</td></tr></tbody>';
  document.getElementById('main').innerHTML='<div class="ph"><div><h2>DFC Mensal</h2><p>Demonstrativo de Fluxo de Caixa</p></div>'+mnHTML()+'</div><div class="card"><table>'+h+'</table></div>';
}

// в”Ђв”Ђ ANUAL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function rAnual(){
  var ay=parseInt((document.getElementById('aySel')||{value:curY}).value||curY);
  var labs=[],rA=[],dA=[],rows='';
  for(var m=0;m<12;m++){var c=calc(ay,m),res=c.rec-c.des;labs.push(MONTHS[m].slice(0,3));rA.push(c.rec);dA.push(c.des);rows+='<tr><td>'+MONTHS[m]+'</td><td class="tr2">'+fmt(c.si)+'</td><td class="tr2 ap">'+fmt(c.rec)+'</td><td class="tr2 an">'+fmt(c.des)+'</td><td class="tr2" style="color:'+(res>=0?'#10b981':'#ef4444')+';font-weight:600">'+(res>=0?'+':'')+fmt(res)+'</td><td class="tr2" style="color:'+(c.sf>=0?'#10b981':'#ef4444')+';font-weight:700">'+fmt(c.sf)+'</td></tr>';}
  document.getElementById('main').innerHTML='<div class="ph"><div><h2>VisГЈo Anual</h2><p>Consolidado por mГЄs</p></div><select id="aySel" onchange="rAnual()" style="background:#1a2235;border:1px solid #1e2d45;border-radius:7px;color:#e2e8f0;padding:6px 11px;font-family:inherit;font-size:13px;cursor:pointer">'+[2024,2025,2026,2027].map(function(y){return'<option'+(y===ay?' selected':'')+'>'+y+'</option>'}).join('')+'</select></div><div class="card"><div class="ch"><div class="ct">Receitas vs Despesas '+ay+'</div></div><div class="cb"><canvas id="ch-an" height="220"></canvas></div></div><div class="card"><table><thead><tr><th>MГЄs</th><th class="tr2">Saldo Inicial</th><th class="tr2">Receitas</th><th class="tr2">Despesas</th><th class="tr2">Resultado</th><th class="tr2">Saldo Final</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  mkChart('ch-an',labs,rA,dA,'line');
}

// в”Ђв”Ђ SALDO в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function rSaldo(){
  var now=new Date(),dm=mkey(now.getFullYear(),now.getMonth());
  var sorted=[].concat(saldos).sort(function(a,b){return b.mes.localeCompare(a.mes)});
  var sRows=sorted.length?sorted.map(function(s){var p=s.mes.split('-');return'<tr><td>'+MONTHS[parseInt(p[1])-1]+' '+p[0]+'</td><td>'+(s.obs||'вЂ”')+'</td><td class="tr2 ap">'+fmt(s.valor)+'</td><td><button class="btn btd sm" onclick="delSaldo(\''+s.mes+'\')">Г—</button></td></tr>'}).join(''):'<tr><td colspan="4"><div class="empty"><div>рџ’°</div>Nenhum saldo</div></td></tr>';
  document.getElementById('main').innerHTML='<div class="ph"><div><h2>Saldo Inicial</h2><p>Configure o saldo de abertura por mГЄs</p></div></div><div class="g2"><div class="card" style="margin:0"><div class="ch"><div class="ct">Definir Saldo</div></div><div class="cb"><div style="display:flex;flex-direction:column;gap:11px"><div class="fg"><label>MГЄs/Ano</label><input type="month" id="si-mes" value="'+dm+'"></div><div class="fg"><label>Valor (R$)</label><input type="number" id="si-val" placeholder="0,00" step="0.01"></div><div class="fg"><label>ObservaГ§ГЈo</label><input type="text" id="si-obs" placeholder="Opcional..."></div><button class="btn btp" onclick="saveSaldo()">Salvar Saldo</button></div></div></div><div class="card" style="margin:0"><div class="ch"><div class="ct">Saldos Cadastrados</div></div><table><thead><tr><th>MГЄs</th><th>Obs</th><th class="tr2">Valor</th><th></th></tr></thead><tbody>'+sRows+'</tbody></table></div></div>';
}
function saveSaldo(){var mes=document.getElementById('si-mes').value,valor=parseFloat(document.getElementById('si-val').value),obs=document.getElementById('si-obs').value;if(!mes||isNaN(valor)){showToast('Preencha mГЄs e valor','er');return}db.collection('saldos').doc(mes).set({mes:mes,valor:valor,obs:obs});document.getElementById('si-val').value='';document.getElementById('si-obs').value='';showToast('Saldo salvo!');}
function delSaldo(mes){db.collection('saldos').doc(mes).delete();showToast('Removido')}

// в”Ђв”Ђ CENTROS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function rCentros(){
  function mkR(tipo){var isE=tipo==='entrada';if(!centros[tipo].length)return'<tr><td colspan="4"><div class="empty"><div>рџ—‚пёЏ</div>Nenhum centro</div></td></tr>';return centros[tipo].map(function(n,i){return'<tr><td style="color:#475569;width:30px">'+(i+1)+'</td><td style="color:#e2e8f0;font-weight:500">'+n+'</td><td><span class="tg '+(isE?'tg-e':'tg-s')+'">'+(isE?'Receita':'Despesa')+'</span></td><td><button class="btn btd sm" onclick="delCC(\''+tipo+'\',\''+n.replace(/'/g,"\\'")+'\')">Г—</button></td></tr>'}).join('')}
  document.getElementById('main').innerHTML='<div class="ph"><div><h2>Centros de Custo</h2><p>Gerencie as categorias</p></div></div><div class="g2"><div><div class="card"><div class="ch"><div class="ct">Adicionar Receita</div><span class="bdg bdg-e">Receita</span></div><div class="cb"><div style="display:flex;gap:8px"><input type="text" id="cc-e" placeholder="Nome do centro..." style="flex:1" onkeydown="if(event.key===\'Enter\')addCC(\'entrada\')"><button class="btn btp sm" onclick="addCC(\'entrada\')">Adicionar</button></div></div></div><div class="card"><div class="ch"><div class="ct">Receitas ('+centros.entrada.length+')</div></div><table><thead><tr><th>#</th><th>Nome</th><th>Tipo</th><th></th></tr></thead><tbody>'+mkR('entrada')+'</tbody></table></div></div><div><div class="card"><div class="ch"><div class="ct">Adicionar Despesa</div><span class="bdg bdg-s">Despesa</span></div><div class="cb"><div style="display:flex;gap:8px"><input type="text" id="cc-s" placeholder="Nome do centro..." style="flex:1" onkeydown="if(event.key===\'Enter\')addCC(\'saida\')"><button class="btn btp sm" onclick="addCC(\'saida\')">Adicionar</button></div></div></div><div class="card"><div class="ch"><div class="ct">Despesas ('+centros.saida.length+')</div></div><table><thead><tr><th>#</th><th>Nome</th><th>Tipo</th><th></th></tr></thead><tbody>'+mkR('saida')+'</tbody></table></div></div></div>';
}
function addCC(tipo){var inp=document.getElementById(tipo==='entrada'?'cc-e':'cc-s'),nome=inp.value.trim();if(!nome){showToast('Digite um nome','er');return}if(centros[tipo].indexOf(nome)>=0){showToast('JГЎ existe','er');return}centros[tipo].push(nome);inp.value='';db.collection('config').doc('centros').set(centros);showToast('Centro adicionado!');}
function delCC(tipo,nome){var emUso=entries.some(function(e){return e.tipo===tipo&&e.cc===nome});if(emUso&&!confirm('"'+nome+'" estГЎ em uso. Remover mesmo assim?'))return;centros[tipo]=centros[tipo].filter(function(c){return c!==nome});db.collection('config').doc('centros').set(centros);showToast('Removido')}

// в”Ђв”Ђ CHART в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function mkChart(id,labs,rD,dD,type){if(charts[id])charts[id].destroy();var ctx=document.getElementById(id);if(!ctx)return;charts[id]=new Chart(ctx,{type:type,data:{labels:labs,datasets:[{label:'Receitas',data:rD,backgroundColor:type==='bar'?'rgba(16,185,129,.7)':undefined,borderColor:'#10b981',fill:type==='line',tension:.3,borderWidth:2,pointRadius:3,pointBackgroundColor:'#10b981',borderRadius:type==='bar'?4:0},{label:'Despesas',data:dD,backgroundColor:type==='bar'?'rgba(239,68,68,.7)':undefined,borderColor:'#ef4444',fill:type==='line',tension:.3,borderWidth:2,pointRadius:3,pointBackgroundColor:'#ef4444',borderRadius:type==='bar'?4:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748b',font:{size:11}}}},scales:{x:{ticks:{color:'#64748b',font:{size:11}},grid:{color:'rgba(30,45,69,.4)'},border:{color:'transparent'}},y:{ticks:{color:'#64748b',font:{size:11},callback:function(v){return'R$'+v.toLocaleString('pt-BR')}},grid:{color:'rgba(30,45,69,.4)'},border:{color:'transparent'}}}}});}

function showToast(msg,type){var t=document.getElementById('toast');t.textContent=(type==='er'?'вњ• ':'вњ“ ')+msg;t.className='toast on '+(type||'ok');setTimeout(function(){t.className='toast'},2400);}

buildNav();render();
</script>
</body>
