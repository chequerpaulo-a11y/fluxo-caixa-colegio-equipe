<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFC — Colégio Equipe</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--sf:#111827;--sf2:#1a2235;--bd:#1e2d45;--ac:#2563eb;--gn:#10b981;--rd:#ef4444;--yw:#f59e0b;--pu:#8b5cf6;--tx:#e2e8f0;--md:#64748b;--dm:#94a3b8}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}
header{background:var(--sf);border-bottom:1px solid var(--bd);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:150;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.lm{width:32px;height:32px;background:var(--ac);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.lt h1{font-size:14px;font-weight:600;white-space:nowrap}
.lt span{font-size:10px;color:var(--md);text-transform:uppercase;letter-spacing:.06em}
.hbts{display:flex;gap:7px;align-items:center;flex-shrink:0}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--yw);flex-shrink:0}
.sdot.ok{background:var(--gn)}.sdot.er{background:var(--rd)}
.ubadge{display:flex;align-items:center;gap:5px;background:var(--sf2);border:1px solid var(--bd);border-radius:20px;padding:3px 10px 3px 3px;font-size:12px;color:var(--dm);cursor:pointer}
.uav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;background:var(--ac);flex-shrink:0}
.menu-btn{display:none;background:none;border:none;color:var(--tx);cursor:pointer;padding:6px;border-radius:6px;align-items:center;justify-content:center;flex-shrink:0}
.nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:148}
.nav-overlay.open{display:block}
.layout{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 58px)}
nav{background:var(--sf);border-right:1px solid var(--bd);padding:16px 0;overflow-y:auto;z-index:149}
.nl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#475569;padding:0 16px;margin:10px 0 3px}
.ni{display:flex;align-items:center;gap:8px;padding:9px 16px;color:var(--dm);cursor:pointer;font-size:13px;border-left:2px solid transparent;transition:all .15s}
.ni:hover{background:var(--sf2);color:var(--tx)}
.ni.on{background:rgba(37,99,235,.1);color:#60a5fa;border-left-color:var(--ac);font-weight:600}
.ndiv{height:1px;background:var(--bd);margin:8px 16px}
main{padding:24px;overflow-y:auto;min-width:0}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.ph h2{font-size:22px;font-weight:700;letter-spacing:-.01em}
.ph p{font-size:12px;color:var(--md);margin-top:2px}
.ph-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mnav{display:flex;align-items:center;gap:5px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:4px 6px}
.mnavbtn{background:none;border:none;color:var(--md);cursor:pointer;padding:4px 8px;border-radius:5px;font-size:17px;line-height:1}
.mnavbtn:hover{background:var(--sf2);color:var(--tx)}
.ml{font-size:13px;font-weight:500;color:var(--tx);min-width:120px;text-align:center}
.sg{display:grid;gap:12px;margin-bottom:16px}
.sg2{grid-template-columns:repeat(2,1fr)}
.sg3{grid-template-columns:repeat(3,1fr)}
.sg4{grid-template-columns:repeat(4,1fr)}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px;border-top:2px solid var(--bd);cursor:default}
.sc.link{cursor:pointer}.sc.link:hover{border-color:var(--ac)}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--md);margin-bottom:7px}
.sv{font-size:20px;font-weight:700}
.ss{font-size:11px;color:var(--md);margin-top:4px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:14px}
.ch{padding:13px 17px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ct{font-size:13px;font-weight:600}
.cs{font-size:11px;color:var(--md);margin-top:2px}
.cb{padding:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--md);padding:7px 11px;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:9px 11px;font-size:13px;color:var(--dm);border-bottom:1px solid rgba(30,45,69,.35)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--sf2)}
.tr2{text-align:right}
.tg{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;white-space:nowrap}
.tg-e{background:rgba(16,185,129,.12);color:var(--gn)}
.tg-s{background:rgba(239,68,68,.12);color:var(--rd)}
.tg-t{background:rgba(99,102,241,.12);color:#818cf8}
.tg-pend{background:rgba(148,163,184,.1);color:var(--dm)}
.tg-atras{background:rgba(239,68,68,.15);color:var(--rd)}
.tg-vence{background:rgba(245,158,11,.15);color:var(--yw)}
.tg-pago{background:rgba(16,185,129,.15);color:var(--gn)}
.tg-fix{background:rgba(99,102,241,.15);color:#818cf8}
.tg-proj{background:rgba(139,92,246,.15);color:#a78bfa}
.tg-auto{background:rgba(37,99,235,.12);color:#60a5fa}
.tg-man{background:rgba(99,102,241,.15);color:#818cf8}
.tg-emit{background:rgba(245,158,11,.12);color:var(--yw)}
.tg-comp{background:rgba(16,185,129,.12);color:var(--gn)}
.tg-dev{background:rgba(239,68,68,.12);color:var(--rd)}
.tg-canc{background:rgba(148,163,184,.1);color:var(--md)}
.ap{color:var(--gn);font-weight:600}.an{color:var(--rd);font-weight:600}.aw{color:var(--yw);font-weight:600}.apu{color:#a78bfa;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btp{background:var(--ac);color:#fff}.btp:hover{background:#1d4ed8}
.btg{background:rgba(16,185,129,.15);color:var(--gn);border:1px solid rgba(16,185,129,.3)}.btg:hover{background:rgba(16,185,129,.25)}
.bty{background:rgba(245,158,11,.15);color:var(--yw);border:1px solid rgba(245,158,11,.3)}
.bts{background:var(--sf2);color:var(--dm);border:1px solid var(--bd)}.bts:hover{color:var(--tx)}
.btd{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.2)}
.btpu{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.sm{padding:5px 10px;font-size:12px}
input,select{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;color:var(--tx);padding:9px 12px;font-family:inherit;font-size:13px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus{border-color:var(--ac)}
select option{background:var(--sf)}
label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--md);margin-bottom:4px;display:block}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.f2{grid-column:span 2}.fg.f3{grid-column:span 3}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.chk-wrap{display:flex;align-items:center;gap:10px;grid-column:1/-1;margin-top:4px}
.chk-wrap input[type=checkbox]{width:auto;padding:0;margin:0}
.chk-wrap label{text-transform:none;font-size:13px;color:var(--tx);margin:0;cursor:pointer;letter-spacing:0;font-weight:400}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.mbox{background:var(--sf);border:1px solid var(--bd);border-radius:14px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}
.mbox-sm{max-width:400px}
.mh{padding:17px 21px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mh h3{font-size:17px;font-weight:700}
.mcl{padding:21px}
.mf{padding:13px 21px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:7px}
.tsel{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.tsel2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.tb{padding:10px;border-radius:7px;border:1.5px solid var(--bd);background:var(--sf2);color:var(--dm);cursor:pointer;text-align:center;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
.tb.te{background:rgba(16,185,129,.1);border-color:var(--gn);color:var(--gn)}
.tb.ts{background:rgba(239,68,68,.1);border-color:var(--rd);color:var(--rd)}
.tb.tt{background:rgba(99,102,241,.1);border-color:#818cf8;color:#818cf8}
.toast{position:fixed;bottom:20px;right:20px;background:var(--sf);border:1px solid var(--bd);border-radius:9px;padding:11px 17px;font-size:13px;color:var(--tx);z-index:999;transform:translateY(80px);opacity:0;transition:all .3s ease;pointer-events:none;max-width:300px}
.toast.on{transform:translateY(0);opacity:1}
.toast.ok{border-left:3px solid var(--gn)}.toast.er{border-left:3px solid var(--rd)}
.empty{text-align:center;padding:36px 20px;color:var(--md)}
.empty-icon{font-size:28px;margin-bottom:8px}
.pr{margin-bottom:10px}.pi{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.pb{height:4px;background:var(--bd);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .5s}
.dsh td{background:var(--sf2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--md);padding:7px 14px}
.dit td{padding:8px 14px 8px 26px;font-size:13px;color:var(--dm);border-bottom:1px solid rgba(30,45,69,.3)}
.dst td{padding:9px 14px;font-size:13px;font-weight:700;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd)}
.dtot td{padding:13px 14px;font-size:15px;font-weight:700;background:rgba(37,99,235,.08);border-top:2px solid var(--ac)}
.bdg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em}
.bdg-e{background:rgba(16,185,129,.15);color:var(--gn)}
.bdg-s{background:rgba(239,68,68,.15);color:var(--rd)}
.fbar{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.fbtn{padding:5px 12px;border-radius:20px;border:1px solid var(--bd);background:none;color:var(--dm);font:12px inherit;cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:var(--ac);color:var(--tx)}
.fbtn.on{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600}
tr.row-atras td{background:rgba(239,68,68,.04)}
tr.row-vence td{background:rgba(245,158,11,.04)}
.baixa-info{background:var(--sf2);border-radius:8px;padding:12px;margin-bottom:14px}
.alert-box{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:12px 16px;margin-bottom:14px}
.al-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--yw);margin-bottom:8px}
.al-item{font-size:12px;color:#fbbf24;padding:3px 0;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
.contas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.conta-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cheque-tipo-bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.ctb{padding:11px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf2);color:var(--dm);cursor:pointer;text-align:center;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
.ctb.on-e{background:rgba(16,185,129,.1);border-color:var(--gn);color:var(--gn)}
.ctb.on-s{background:rgba(239,68,68,.1);border-color:var(--rd);color:var(--rd)}
.chart-wrap{position:relative;height:240px}
.print-btn{background:rgba(99,102,241,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.print-btn:hover{background:rgba(99,102,241,.25)}
@media print{
  header,nav,.nav-overlay,.ph-r,.fbar,.btn,.toast{display:none!important}
  .layout{display:block}
  main{padding:0}
  .card{border:1px solid #ccc;margin-bottom:12px;break-inside:avoid}
  body{background:#fff;color:#000;font-size:12px}
  .sf{background:#fff}
  .dsh td{background:#f5f5f5}
  .dit td,.dst td,.dtot td{color:#000}
  .ap{color:#16a34a}.an{color:#dc2626}.aw{color:#d97706}
}
@media(max-width:768px){
  .menu-btn{display:flex}
  .layout{grid-template-columns:1fr}
  nav{display:none;position:fixed;top:0;left:0;bottom:0;width:80%;max-width:270px;box-shadow:4px 0 24px rgba(0,0,0,.5);padding-top:60px}
  nav.open{display:block}
  main{padding:14px}
  .sg4{grid-template-columns:1fr 1fr}
  .sg3{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .contas-grid{grid-template-columns:1fr 1fr}
  .fgrid{grid-template-columns:1fr}
  .fgrid3{grid-template-columns:1fr}
  .fg.f2,.fg.f3{grid-column:span 1}
  .tsel{grid-template-columns:1fr}
  .cheque-tipo-bar{grid-template-columns:1fr}
  th,td{padding:6px 8px;font-size:12px}
  .btn{padding:7px 11px;font-size:12px}
  .toast{right:12px;bottom:12px;max-width:calc(100vw - 24px)}
  .chart-wrap{height:180px}
}
@media(max-width:400px){
  .sg4,.sg3,.sg2{grid-template-columns:1fr}
  .contas-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="menu-btn" id="menu-btn" onclick="toggleNav()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="logo">
      <div class="lm">CE</div>
      <div class="lt"><h1>Colégio Equipe</h1><span>Fluxo de Caixa</span></div>
    </div>
  </div>
  <div class="hbts">
    <div class="sdot" id="sdot" title="Conectando..."></div>
    <div class="ubadge" onclick="switchUser()">
      <div class="uav" id="uav">P</div>
      <span id="uname">Paulo</span> ▾
    </div>
    <button class="btn btp sm" onclick="openModal()">+ Lançamento</button>
  </div>
</header>
<div class="nav-overlay" id="nav-overlay" onclick="closeNav()"></div>
<div class="layout">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<!-- MODAL LANÇAMENTO -->
<div class="mo" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="mbox">
    <div class="mh"><h3 id="modal-title">Novo Lançamento</h3><span style="cursor:pointer;font-size:22px;color:var(--md)" onclick="closeModal()">×</span></div>
    <div class="mcl">
      <div class="tsel">
        <button class="tb te" id="tb-e" onclick="setTipo('entrada')">↑ Receita</button>
        <button class="tb" id="tb-s" onclick="setTipo('saida')">↓ Despesa</button>
        <button class="tb" id="tb-t" onclick="setTipo('transferencia')">⇄ Transf.</button>
      </div>
      <div class="fgrid" id="f-normal">
        <div class="fg"><label>Data</label><input type="date" id="f-dt"></div>
        <div class="fg"><label>Competência</label><input type="month" id="f-comp"></div>
        <div class="fg"><label>Valor (R$)</label><input type="number" id="f-vl" placeholder="0,00" step="0.01" min="0"></div>
        <div class="fg"><label>Conta Bancária</label><select id="f-conta"></select></div>
        <div class="fg f2"><label>Descrição</label><input type="text" id="f-ds" placeholder="Ex: Mensalidades de abril..."></div>
        <div class="fg f2"><label>Centro de Custo</label><select id="f-cc"></select></div>
        <div class="fg"><label>Usuário</label><select id="f-us"><option>Paulo</option><option>João</option></select></div>
        <div class="fg"><label>Pagamento</label><select id="f-pg"><option>PIX</option><option>Dinheiro</option><option>Cartão Débito</option><option>Cartão Crédito</option><option>Transferência</option><option>Boleto</option><option>Cheque</option></select></div>
        <div class="fg f2"><label>Observações</label><input type="text" id="f-ob" placeholder="Opcional..."></div>
      </div>
      <div class="fgrid3" id="f-transf" style="display:none">
        <div class="fg"><label>Data</label><input type="date" id="ft-dt"></div>
        <div class="fg"><label>Valor (R$)</label><input type="number" id="ft-vl" placeholder="0,00" step="0.01" min="0"></div>
        <div class="fg"><label>Usuário</label><select id="ft-us"><option>Paulo</option><option>João</option></select></div>
        <div class="fg"><label>Conta Origem</label><select id="ft-origem"></select></div>
        <div class="fg"><label>Conta Destino</label><select id="ft-destino"></select></div>
        <div class="fg f3"><label>Descrição</label><input type="text" id="ft-ds" placeholder="Ex: Nubank → Caixa..."></div>
        <div class="fg f3"><label>Observações</label><input type="text" id="ft-ob" placeholder="Opcional..."></div>
      </div>
    </div>
    <div class="mf">
      <button class="btn bts sm" onclick="closeModal()">Cancelar</button>
      <button class="btn btp sm" onclick="saveEntry()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL CONTA BANCÁRIA -->
<div class="mo" id="modal-banco" onclick="if(event.target===this)closeModalBanco()">
  <div class="mbox mbox-sm">
    <div class="mh"><h3 id="mb2-title">Nova Conta Bancária</h3><span style="cursor:pointer;font-size:22px;color:var(--md)" onclick="closeModalBanco()">×</span></div>
    <div class="mcl">
      <div class="fgrid">
        <div class="fg f2"><label>Nome</label><input type="text" id="bc-nome" placeholder="Ex: Nubank, Caixa..."></div>
        <div class="fg"><label>Tipo</label><select id="bc-tipo"><option value="corrente">Conta Corrente</option><option value="poupanca">Poupança</option><option value="caixa">Caixa/Dinheiro</option><option value="investimento">Investimento</option><option value="outro">Outro</option></select></div>
        <div class="fg"><label>Cor</label><select id="bc-cor"><option value="#2563eb">Azul</option><option value="#10b981">Verde</option><option value="#ef4444">Vermelho</option><option value="#f59e0b">Amarelo</option><option value="#8b5cf6">Roxo</option><option value="#ec4899">Rosa</option><option value="#64748b">Cinza</option></select></div>
        <div class="fg"><label>Saldo Inicial (R$)</label><input type="number" id="bc-saldo" placeholder="0,00" step="0.01"></div>
        <div class="fg"><label>Data Saldo Inicial</label><input type="date" id="bc-data"></div>
      </div>
    </div>
    <div class="mf">
      <button class="btn bts sm" onclick="closeModalBanco()">Cancelar</button>
      <button class="btn btp sm" onclick="saveBanco()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL CONTA A PAGAR/RECEBER -->
<div class="mo" id="modal-orc" onclick="if(event.target===this)closeModalOrc()">
  <div class="mbox">
    <div class="mh"><h3 id="mo-title">Nova Conta</h3><span style="cursor:pointer;font-size:22px;color:var(--md)" onclick="closeModalOrc()">×</span></div>
    <div class="mcl">
      <div class="tsel2">
        <button class="tb ts" id="tb-os" onclick="setOrcTipo('saida')">↓ Conta a Pagar</button>
        <button class="tb" id="tb-oe" onclick="setOrcTipo('entrada')">↑ Conta a Receber</button>
      </div>
      <div class="fgrid3">
        <div class="fg f2"><label>Descrição</label><input type="text" id="mo-desc" placeholder="Ex: Conta de Luz, Mensalidades..."></div>

<script>
var MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DEF_E=['Receita de Mensalidade','Receita de Matrícula','Receita de Material Didático','Receita de Alimentação/Cantina','Receita de Eventos','Receita de Cursos Extracurriculares','Outras Receitas'];
var DEF_S=['Salário Direção','Salário Coordenação','Salário Professores','Salário Func. Administrativos','Salário Func. de Apoio','Encargos/Benefícios','Aluguel','Energia Elétrica','Água e Esgoto','Telefone/Internet','Transporte/Combustível','Material de Limpeza','Material de Expediente','Material Pedagógico','Manutenção Predial','Manutenção de Equipamentos','Marketing e Publicidade','Contabilidade/Honorários','Impostos e Taxas','Seguros','Softwares e Sistemas','Merenda Escolar','Uniformes','Outras Despesas'];

firebase.initializeApp({
  apiKey:"AIzaSyA6ou_d5zxkdU9L97voVu_NAKH-66vkhj0",
  authDomain:"dfc-colegio-equipe.firebaseapp.com",
  projectId:"dfc-colegio-equipe",
  storageBucket:"dfc-colegio-equipe.firebasestorage.app",
  messagingSenderId:"82587696151",
  appId:"1:82587696151:web:1dece79abb74c4e614b052"
});
var db=firebase.firestore();

function ld(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
var entries=[],saldos=[],orcamentos=[],bancos=[],cheques=[],centros=ld('ce6-cen',{entrada:DEF_E.slice(),saida:DEF_S.slice()});
var curM=new Date().getMonth(),curY=new Date().getFullYear();
var curUser='Paulo',selTipo='entrada',orcTipo='saida',chequeTipo='emitido';
var curView='dashboard',filtroOrc='todos',filtroChq='todos';
var charts={},editId=null,editOrcId=null,editBancoId=null,baixaId=null,compId=null;

// ── HELPERS ───────────────────────────────────────────────
function mkey(y,m){return y+'-'+(m+1<10?'0':'')+(m+1)}
function fmt(v){return'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function today(){return new Date().toISOString().split('T')[0]}
function mLbl(){return MONTHS[curM]+' '+curY}
function nowComp(){var n=new Date();return mkey(n.getFullYear(),n.getMonth())}
function setSdot(s){var d=document.getElementById('sdot');d.className='sdot '+(s==='ok'?'ok':s==='er'?'er':'');d.title=s==='ok'?'Sincronizado':s==='er'?'Erro':'Conectando...'}

function getStatusOrc(c){
  if(c.pago)return'pago';
  var h=today();
  if(c.vencimento<h)return'atrasado';
  var d5=new Date();d5.setDate(d5.getDate()+5);
  if(c.vencimento<=d5.toISOString().split('T')[0])return'vence';
  return'pendente';
}
function getStatusCheque(c){
  if(c.status==='compensado')return'compensado';
  if(c.status==='devolvido')return'devolvido';
  if(c.status==='cancelado')return'cancelado';
  if(c.vencimento<today())return'vencido';
  var d5=new Date();d5.setDate(d5.getDate()+5);
  if(c.vencimento<=d5.toISOString().split('T')[0])return'vence';
  return'emitido';
}
function nomeBanco(id){var b=bancos.find(function(x){return x.id===id});return b?b.nome:'—'}
function corBanco(id){var b=bancos.find(function(x){return x.id===id});return b?b.cor:'#64748b'}
function getSaldoBanco(id){
  var b=bancos.find(function(x){return x.id===id});
  var si=b?b.saldoInicial||0:0;
  var movs=entries.filter(function(e){return e.conta===id});
  var rec=movs.filter(function(e){return e.tipo==='entrada'}).reduce(function(a,e){return a+e.valor},0);
  var des=movs.filter(function(e){return e.tipo==='saida'}).reduce(function(a,e){return a+e.valor},0);
  return si+rec-des;
}

// ── FIREBASE ──────────────────────────────────────────────
db.collection('entries').orderBy('ts','desc').onSnapshot(function(s){entries=s.docs.map(function(d){var x=d.data();x.id=d.id;return x});render();setSdot('ok')},function(){setSdot('er')});
db.collection('saldos').onSnapshot(function(s){saldos=s.docs.map(function(d){var x=d.data();x.id=d.id;return x});render()});
db.collection('orcamentos').orderBy('vencimento','asc').onSnapshot(function(s){orcamentos=s.docs.map(function(d){var x=d.data();x.id=d.id;return x});render()},function(){});
db.collection('bancos').orderBy('ts','asc').onSnapshot(function(s){bancos=s.docs.map(function(d){var x=d.data();x.id=d.id;return x});render()},function(){});
db.collection('cheques').orderBy('vencimento','asc').onSnapshot(function(s){cheques=s.docs.map(function(d){var x=d.data();x.id=d.id;return x});render()},function(){});
db.collection('config').doc('centros').onSnapshot(function(s){if(s.exists){centros=s.data();try{localStorage.setItem('ce6-cen',JSON.stringify(centros))}catch(e){}render()}});

// ── NAV ───────────────────────────────────────────────────
var NAV=[
  {g:'Visão Geral',i:[{id:'dashboard',l:'Dashboard'},{id:'bancos',l:'Contas Bancárias'}]},
  {g:'Registros',i:[{id:'lancamentos',l:'Lançamentos'},{id:'entradas',l:'Receitas'},{id:'saidas',l:'Despesas'}]},
  {g:'Orçamento',i:[{id:'apagar',l:'Contas a Pagar'},{id:'areceber',l:'Contas a Receber'},{id:'cheques',l:'Cheques'},{id:'projetado',l:'Projetado vs Realizado'}]},
  {g:'Relatórios',i:[{id:'dre',l:'DRE Mensal'},{id:'dfc',l:'DFC Mensal'},{id:'anual',l:'Visão Anual'},{id:'extrato',l:'Extrato por Conta'},{id:'inadimplencia',l:'Inadimplência'}]},
  {g:'Config',i:[{id:'saldo',l:'Saldo Inicial'},{id:'centros',l:'Centros de Custo'}]}
];

function buildNav(){
  var h='';
  NAV.forEach(function(g){
    h+='<div class="nl">'+g.g+'</div>';
    g.i.forEach(function(n){h+='<div class="ni'+(n.id===curView?' on':'')+'" onclick="goTo(\''+n.id+'\')">'+n.l+'</div>';});
    h+='<div class="ndiv"></div>';
  });
  document.getElementById('nav').innerHTML=h;
}
function goTo(v){curView=v;filtroOrc='todos';filtroChq='todos';buildNav();render();closeNav()}
function toggleNav(){document.getElementById('nav').classList.toggle('open');document.getElementById('nav-overlay').classList.toggle('open')}
function closeNav(){document.getElementById('nav').classList.remove('open');document.getElementById('nav-overlay').classList.remove('open')}
function switchUser(){curUser=curUser==='Paulo'?'João':'Paulo';var av=document.getElementById('uav');av.textContent=curUser[0];av.style.background=curUser==='Paulo'?'#2563eb':'#7c3aed';document.getElementById('uname').textContent=curUser;}
function chM(d){curM+=d;if(curM<0){curM=11;curY--}if(curM>11){curM=0;curY++}render()}
function mnHTML(){return'<div class="mnav"><button class="mnavbtn" onclick="chM(-1)">&#8249;</button><span class="ml">'+mLbl()+'</span><button class="mnavbtn" onclick="chM(1)">&#8250;</button></div>'}

// ── CALC ──────────────────────────────────────────────────
function getEs(y,m){return entries.filter(function(e){return e.date&&e.date.indexOf(mkey(y,m))===0})}
function getEsComp(y,m){
  // por competência — usa campo comp se existir, senão date
  var k=mkey(y,m);
  return entries.filter(function(e){
    var c=e.comp||e.date;
    return c&&c.indexOf(k)===0;
  });
}
function getSI(y,m){
  var s=saldos.find(function(x){return x.mes===mkey(y,m)});
  if(s)return s.valor;
  var pm=m-1,py=y;
  if(pm<0){pm=11;py--;}
var es=getEs(py,pm).filter(function(e){return!e.contaOrigem&&!e.contaDestino});
  var rec=es.filter(function(e){return e.tipo==='entrada'}).reduce(function(a,e){return a+e.valor},0);
  var des=es.filter(function(e){return e.tipo==='saida'}).reduce(function(a,e){return a+e.valor},0);
  var siP=saldos.find(function(x){return x.mes===mkey(py,pm)});
  return(siP?siP.valor:0)+rec-des;
}
function calc(y,m){
  var es=getEs(y,m).filter(function(e){return!e.contaOrigem&&!e.contaDestino});
  var rec=es.filter(function(e){return e.tipo==='entrada'}).reduce(function(a,e){return a+e.valor},0);
  var des=es.filter(function(e){return e.tipo==='saida'}).reduce(function(a,e){return a+e.valor},0);
  var si=getSI(y,m);
  return{rec:rec,des:des,si:si,sf:si+rec-des};
}
function calcComp(y,m){
  var es=getEsComp(y,m).filter(function(e){return!e.contaOrigem&&!e.contaDestino});
  var rec=es.filter(function(e){return e.tipo==='entrada'}).reduce(function(a,e){return a+e.valor},0);
  var des=es.filter(function(e){return e.tipo==='saida'}).reduce(function(a,e){return a+e.valor},0);
  return{rec:rec,des:des,resultado:rec-des};
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  var map={
    dashboard:rDash,bancos:rBancos,
    lancamentos:rLanc,entradas:function(){rTipo('entrada')},saidas:function(){rTipo('saida')},

  };

}

// ── ALERTAS ───────────────────────────────────────────────
function alertasHTML(){
  var h=today();var d5=new Date();d5.setDate(d5.getDate()+5);var d5s=d5.toISOString().split('T')[0];
  var alO=orcamentos.filter(function(c){return!c.pago&&c.vencimento>=h&&c.vencimento<=d5s});
  var alC=cheques.filter(function(c){return c.status==='emitido'&&c.vencimento>=h&&c.vencimento<=d5s});
  if(!alO.length&&!alC.length)return'';
  var items=alO.map(function(c){var dias=Math.ceil((new Date(c.vencimento)-new Date(h))/864e5);return'<div class="al-item"><span>'+(c.tipo==='saida'?'💸':'💰')+' '+c.desc+'</span><span>'+(dias===0?'Hoje':'Em '+dias+'d')+' — '+fmt(c.valor)+'</span></div>';});
  items=items.concat(alC.map(function(c){var dias=Math.ceil((new Date(c.vencimento)-new Date(h))/864e5);return'<div class="al-item"><span>🏦 Cheque: '+c.favorecido+'</span><span>'+(dias===0?'Hoje':'Em '+dias+'d')+' — '+fmt(c.valor)+'</span></div>';}));
  return'<div class="alert-box"><div class="al-title">⚠ Vencimentos próximos ('+(alO.length+alC.length)+')</div>'+items.join('')+'</div>';
}

// ── DASHBOARD ─────────────────────────────────────────────
function rDash(){
  var c=calc(curY,curM),es=getEs(curY,curM),res=c.rec-c.des;
  var labs=[],rA=[],dA=[];
  for(var i=5;i>=0;i--){var m=curM-i,y=curY;while(m<0){m+=12;y--}var cc=calc(y,m);labs.push(MONTHS[m].slice(0,3));rA.push(cc.rec);dA.push(cc.des)}
  var rcc={},dcc={};
  es.forEach(function(e){if(e.tipo==='entrada')rcc[e.cc]=(rcc[e.cc]||0)+e.valor;else if(e.tipo==='saida')dcc[e.cc]=(dcc[e.cc]||0)+e.valor});
  var rT=Object.values(rcc).reduce(function(a,v){return a+v},0);
  var dT=Object.values(dcc).reduce(function(a,v){return a+v},0);
  var topR=Object.entries(rcc).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
  var topD=Object.entries(dcc).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
  var l8=[].concat(entries).sort(function(a,b){return(b.ts||0)-(a.ts||0)}).slice(0,8);
  var aPagar=orcamentos.filter(function(c){return c.tipo==='saida'&&!c.pago}).reduce(function(a,c){return a+c.valor},0);
  var aRec=orcamentos.filter(function(c){return c.tipo==='entrada'&&!c.pago}).reduce(function(a,c){return a+c.valor},0);
  function ccP(items,total,col){
    if(!items.length)return'<div class="empty"><div class="empty-icon">📊</div>Sem dados</div>';
    return items.map(function(x){var p=total>0?(x[1]/total*100).toFixed(0):0;return'<div class="pr"><div class="pi"><span style="color:var(--dm);font-size:12px">'+x[0]+'</span><span style="font-weight:600;color:'+col+'">'+fmt(x[1])+'</span></div><div class="pb"><div class="pf" style="width:'+p+'%;background:'+col+'"></div></div></div>';}).join('');
  }
  var bancosH=bancos.length?'<div class="contas-grid">'+bancos.map(function(b){var sal=getSaldoBanco(b.id);return'<div style="background:var(--sf2);border:1px solid var(--bd);border-top:2px solid '+b.cor+';border-radius:10px;padding:14px;cursor:pointer" onclick="goTo(\'bancos\')"><div style="display:flex;align-items:center;gap:7px;margin-bottom:6px"><div class="conta-dot" style="background:'+b.cor+'"></div><span style="font-weight:600;font-size:13px;color:var(--tx)">'+b.nome+'</span></div><div style="font-size:10px;color:var(--md);text-transform:uppercase;margin-bottom:6px">'+b.tipo+'</div><div style="font-size:20px;font-weight:700;color:'+(sal>=0?'var(--gn)':'var(--rd)')+'">'+fmt(sal)+'</div></div>';}).join('')+'</div>':'<div style="color:var(--md);font-size:13px">Nenhuma conta. <span style="color:#60a5fa;cursor:pointer" onclick="goTo(\'bancos\')">Adicionar →</span></div>';

  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>Dashboard</h2><p>Visão executiva do caixa</p></div>'+mnHTML()+'</div>'+
  alertasHTML()+
  '<div class="sg sg4">'+
  '<div class="sc" style="border-top-color:var(--ac)"><div class="sl">Saldo Inicial</div><div class="sv">'+fmt(c.si)+'</div><div class="ss">'+mLbl()+'</div></div>'+
  '<div class="sc" style="border-top-color:var(--gn)"><div class="sl">Receitas</div><div class="sv ap">'+fmt(c.rec)+'</div><div class="ss">'+es.filter(function(e){return e.tipo==='entrada'}).length+' lançamentos</div></div>'+
  '<div class="sc" style="border-top-color:var(--rd)"><div class="sl">Despesas</div><div class="sv an">'+fmt(c.des)+'</div><div class="ss">'+es.filter(function(e){return e.tipo==='saida'}).length+' lançamentos</div></div>'+
  '<div class="sc" style="border-top-color:var(--yw)"><div class="sl">Saldo Final</div><div class="sv '+(c.sf>=0?'ap':'an')+'">'+fmt(c.sf)+'</div><div class="ss">'+(res>=0?'▲ +':'▼ ')+fmt(Math.abs(res))+'</div></div>'+
  '</div>'+
  '<div class="card"><div class="ch"><div class="ct">Saldo por Conta Bancária</div><button class="btn bts sm" onclick="goTo(\'bancos\')">Gerenciar</button></div><div class="cb">'+bancosH+'</div></div>'+
  '<div class="sg sg2" style="margin-bottom:16px">'+
  '<div class="sc link" style="border-top-color:var(--rd)" onclick="goTo(\'apagar\')"><div class="sl">A Pagar (pendente)</div><div class="sv an">'+fmt(aPagar)+'</div><div class="ss">Clique para ver</div></div>'+
  '<div class="sc link" style="border-top-color:var(--gn)" onclick="goTo(\'areceber\')"><div class="sl">A Receber (pendente)</div><div class="sv ap">'+fmt(aRec)+'</div><div class="ss">Clique para ver</div></div>'+
  '</div>'+
  '<div class="g3">'+
  '<div class="card" style="margin:0"><div class="ch"><div><div class="ct">Evolução Mensal</div><div class="cs">Últimos 6 meses</div></div></div><div class="cb"><div class="chart-wrap"><canvas id="ch-ev"></canvas></div></div></div>'+
  '<div class="card" style="margin:0"><div class="ch"><div class="ct">Receitas por Centro</div></div><div class="cb">'+ccP(topR,rT,'var(--gn)')+'</div></div>'+

// ── ORÇAMENTO (CONTAS A PAGAR/RECEBER) ────────────────────
function rOrc(tipo){
  var isPagar=tipo==='saida';
  var lista=orcamentos.filter(function(c){return c.tipo===tipo});
  if(filtroOrc!=='todos')lista=lista.filter(function(c){return getStatusOrc(c)===filtroOrc});
  var totPend=orcamentos.filter(function(c){return c.tipo===tipo&&!c.pago}).reduce(function(a,c){return a+c.valor},0);
  var totPago=orcamentos.filter(function(c){return c.tipo===tipo&&c.pago}).reduce(function(a,c){return a+(c.valorPago||c.valor)},0);
  var totAtras=orcamentos.filter(function(c){return c.tipo===tipo&&getStatusOrc(c)==='atrasado'}).reduce(function(a,c){return a+c.valor},0);

  function stTag(c){
    var s=getStatusOrc(c);
    if(s==='pago')return'<span class="tg tg-pago">✓ Pago</span>';
    if(s==='atrasado')return'<span class="tg tg-atras">Atrasado</span>';
    if(s==='vence')return'<span class="tg tg-vence">Vence em breve</span>';
    return'<span class="tg tg-pend">Pendente</span>';
  }
  function rCls(c){var s=getStatusOrc(c);return s==='atrasado'?' class="row-atras"':s==='vence'?' class="row-vence"':'';}

  var rows=lista.length?lista.map(function(c){
    var d=c.vencimento?c.vencimento.split('-').reverse().join('/'):'—';
    var dp=c.dataPago?c.dataPago.split('-').reverse().join('/'):'—';
    var fix=c.fixa?'<span class="tg tg-fix" style="margin-right:4px">Fixa</span>':'';
    var btns=c.pago
      ?'<button class="btn btd sm" onclick="delOrc(\''+c.id+'\')">×</button>'
      :'<button class="btn btg sm" style="margin-right:4px" onclick="openBaixa(\''+c.id+'\')">✓ Baixa</button><button class="btn bty sm" style="margin-right:4px" onclick="editOrc(\''+c.id+'\')">✎</button><button class="btn btd sm" onclick="delOrc(\''+c.id+'\')">×</button>';
    return'<tr'+rCls(c)+'><td>'+fix+'<span style="color:var(--tx);font-weight:500">'+c.desc+'</span></td><td>'+(c.cc||'—')+'</td><td>'+(c.comp||'—')+'</td><td>'+d+'</td>'+
    '<td class="tr2"><span class="'+(isPagar?'an':'ap')+'">'+(isPagar?'-':'+')+fmt(c.valor)+'</span></td><td>'+stTag(c)+'</td>'+
    '<td style="font-size:12px;color:var(--md)">'+(c.pago?dp+'<br>'+fmt(c.valorPago||c.valor):'—')+'</td><td>'+btns+'</td></tr>';
  }).join(''):emptyRow(8,'Nenhuma conta cadastrada');

  var fbtns=['todos','pendente','atrasado','vence','pago'].map(function(f){
    var lb={todos:'Todos',pendente:'Pendentes',atrasado:'Atrasados',vence:'Vence em breve',pago:'Pagos'};
    return'<button class="fbtn'+(filtroOrc===f?' on':'')+'" onclick="setFiltroOrc(\''+f+'\')">'+lb[f]+'</button>';
  }).join('');

  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>'+(isPagar?'Contas a Pagar':'Contas a Receber')+'</h2><p>'+(isPagar?'Gerencie pagamentos previstos':'Gerencie recebimentos previstos')+'</p></div>'+
  '<button class="btn btp sm" onclick="openModalOrc(\''+tipo+'\')">+ Nova Conta</button></div>'+
  alertasHTML()+
  '<div class="sg sg3">'+
  '<div class="sc" style="border-top-color:var(--yw)"><div class="sl">Pendente</div><div class="sv aw">'+fmt(totPend)+'</div></div>'+
  '<div class="sc" style="border-top-color:'+(isPagar?'var(--rd)':'var(--gn)')+'"><div class="sl">'+(isPagar?'Total Pago':'Total Recebido')+'</div><div class="sv '+(isPagar?'an':'ap')+'">'+fmt(totPago)+'</div></div>'+
  '<div class="sc" style="border-top-color:var(--rd)"><div class="sl">Em Atraso</div><div class="sv an">'+fmt(totAtras)+'</div></div>'+
  '</div>'+
  '<div class="fbar">'+fbtns+'</div>'+
  '<div class="card"><table><thead><tr><th>Descrição</th><th>Centro</th><th>Competência</th><th>Vencimento</th><th class="tr2">Valor</th><th>Status</th><th>Realizado</th><th></th></tr></thead>'+
  '<tbody>'+rows+'</tbody></table></div>';
}
function setFiltroOrc(f){filtroOrc=f;render()}

// ── PROJETADO vs REALIZADO ────────────────────────────────
function rProjetado(){
  var labs=[],projR=[],projD=[],realR=[],realD=[];
  var rows='';
  for(var i=0;i<6;i++){
    var m=curM-2+i,y=curY;
    while(m<0){m+=12;y--}while(m>11){m-=12;y++}
    var k=mkey(y,m);
    var pR=orcamentos.filter(function(c){return c.tipo==='entrada'&&(c.comp||'').indexOf(k)===0}).reduce(function(a,c){return a+c.valor},0);
    var pD=orcamentos.filter(function(c){return c.tipo==='saida'&&(c.comp||'').indexOf(k)===0}).reduce(function(a,c){return a+c.valor},0);
    var rR=entries.filter(function(e){return e.tipo==='entrada'&&(e.comp||e.date||'').indexOf(k)===0}).reduce(function(a,e){return a+e.valor},0);
    var rD=entries.filter(function(e){return e.tipo==='saida'&&(e.comp||e.date||'').indexOf(k)===0}).reduce(function(a,e){return a+e.valor},0);
    var difR=rR-pR,difD=rD-pD;
    labs.push(MONTHS[m].slice(0,3)+'/'+String(y).slice(2));
    projR.push(pR);projD.push(pD);realR.push(rR);realD.push(rD);
    rows+='<tr><td>'+MONTHS[m]+' '+y+'</td>'+
    '<td class="tr2 ap">'+fmt(pR)+'</td><td class="tr2 ap">'+fmt(rR)+'</td>'+
    '<td class="tr2" style="color:'+(difR>=0?'var(--gn)':'var(--rd)')+';font-weight:600">'+(difR>=0?'+':'')+fmt(difR)+'</td>'+
    '<td class="tr2 an">'+fmt(pD)+'</td><td class="tr2 an">'+fmt(rD)+'</td>'+
    '<td class="tr2" style="color:'+(difD<=0?'var(--gn)':'var(--rd)')+';font-weight:600">'+(difD<=0?'':'-')+fmt(Math.abs(difD))+'</td></tr>';
  }
  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>Projetado vs Realizado</h2><p>Orçamento planejado comparado com o realizado</p></div>'+
  '<button class="btn btpu sm" onclick="window.print()">🖨 Imprimir</button></div>'+
  '<div class="card"><div class="ch"><div class="ct">Receitas e Despesas — Projetado vs Realizado</div></div><div class="cb"><div class="chart-wrap"><canvas id="ch-proj"></canvas></div></div></div>'+
  '<div class="card"><table><thead><tr>'+
  '<th>Mês</th>'+
  '<th class="tr2">Rec. Previsto</th><th class="tr2">Rec. Realizado</th><th class="tr2">Dif. Receita</th>'+
  '<th class="tr2">Des. Previsto</th><th class="tr2">Des. Realizado</th><th class="tr2">Dif. Despesa</th>'+
  '</tr></thead><tbody>'+rows+'</tbody></table></div>';

  var ctx=document.getElementById('ch-proj');if(!ctx)return;
  if(charts['proj'])charts['proj'].destroy();
  charts['proj']=new Chart(ctx,{type:'bar',data:{labels:labs,datasets:[
    {label:'Rec. Previsto',data:projR,backgroundColor:'rgba(16,185,129,.3)',borderColor:'#10b981',borderWidth:1.5,borderRadius:3},
    {label:'Rec. Realizado',data:realR,backgroundColor:'rgba(16,185,129,.7)',borderColor:'#10b981',borderWidth:1.5,borderRadius:3},
    {label:'Des. Previsto',data:projD,backgroundColor:'rgba(239,68,68,.3)',borderColor:'#ef4444',borderWidth:1.5,borderRadius:3},
    {label:'Des. Realizado',data:realD,backgroundColor:'rgba(239,68,68,.7)',borderColor:'#ef4444',borderWidth:1.5,borderRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748b',font:{size:11}}}},scales:{x:{ticks:{color:'#64748b',font:{size:11}},grid:{color:'rgba(30,45,69,.4)'}},y:{ticks:{color:'#64748b',font:{size:11},callback:function(v){return'R$'+v.toLocaleString('pt-BR')}},grid:{color:'rgba(30,45,69,.4)'}}}}}); 
}

// ── DRE ───────────────────────────────────────────────────
function rDRE(){
  var cur=calcComp(curY,curM);
  var pm=curM-1,py=curY;if(pm<0){pm=11;py--}
  var prev=calcComp(py,pm);
  var esC=getEsComp(curY,curM);
  var esPrev=getEsComp(py,pm);

  function byCC(es,tipo){
    var map={};
    es.filter(function(e){return e.tipo===tipo}).forEach(function(e){map[e.cc]=(map[e.cc]||0)+e.valor;});
    return map;
  }
  var recCC=byCC(esC,'entrada'),desCC=byCC(esC,'saida');
  var recCCp=byCC(esPrev,'entrada'),desCCp=byCC(esPrev,'saida');

  function ccRow(cc,val,valP,tipo){
    var dif=val-valP;
    var col=tipo==='entrada'?'var(--gn)':'var(--rd)';
    return'<tr class="dit"><td>'+cc+'</td>'+
    '<td class="tr2" style="color:'+col+'">'+fmt(val)+'</td>'+
    '<td class="tr2" style="color:var(--md)">'+fmt(valP)+'</td>'+
    '<td class="tr2" style="color:'+(dif>=0?'var(--gn)':'var(--rd)')+';font-size:11px">'+(dif>=0?'▲':'▼')+' '+fmt(Math.abs(dif))+'</td></tr>';
  }

  var allRecCC=[...new Set([...Object.keys(recCC),...Object.keys(recCCp)])];
  var allDesCC=[...new Set([...Object.keys(desCC),...Object.keys(desCCp)])];
  var pm2=curM-1,py2=curY;if(pm2<0){pm2=11;py2--}

  var h='<tbody>';
  h+='<tr class="dsh"><td colspan="4">1. Receitas — por Competência</td></tr>';
  if(allRecCC.length){allRecCC.forEach(function(cc){h+=ccRow(cc,recCC[cc]||0,recCCp[cc]||0,'entrada');});}
  else{h+='<tr class="dit"><td colspan="4" style="color:var(--md)">Sem receitas no período</td></tr>';}
  h+='<tr class="dst"><td>Total de Receitas</td><td class="tr2 ap">'+fmt(cur.rec)+'</td><td class="tr2" style="color:var(--md)">'+fmt(prev.rec)+'</td><td class="tr2" style="font-size:11px;color:'+(cur.rec-prev.rec>=0?'var(--gn)':'var(--rd)')+'">'+((cur.rec-prev.rec)>=0?'▲':'▼')+' '+fmt(Math.abs(cur.rec-prev.rec))+'</td></tr>';

  h+='<tr class="dsh"><td colspan="4">2. Despesas — por Competência</td></tr>';
  if(allDesCC.length){allDesCC.forEach(function(cc){h+=ccRow(cc,desCC[cc]||0,desCCp[cc]||0,'saida');});}
  else{h+='<tr class="dit"><td colspan="4" style="color:var(--md)">Sem despesas no período</td></tr>';}
  h+='<tr class="dst"><td>Total de Despesas</td><td class="tr2 an">'+fmt(cur.des)+'</td><td class="tr2" style="color:var(--md)">'+fmt(prev.des)+'</td><td class="tr2" style="font-size:11px;color:'+(cur.des-prev.des<=0?'var(--gn)':'var(--rd)')+'">'+((cur.des-prev.des)<=0?'▼':'▲')+' '+fmt(Math.abs(cur.des-prev.des))+'</td></tr>';

  h+='<tr class="dsh"><td colspan="4">3. Resultado</td></tr>';
  h+='<tr class="dtot"><td>Resultado Líquido</td>'+
  '<td class="tr2" style="color:'+(cur.resultado>=0?'var(--gn)':'var(--rd)')+';font-size:17px">'+(cur.resultado>=0?'+':'')+fmt(cur.resultado)+'</td>'+
  '<td class="tr2" style="color:var(--md)">'+fmt(prev.resultado)+'</td>'+
  '<td class="tr2" style="font-size:11px;color:'+(cur.resultado-prev.resultado>=0?'var(--gn)':'var(--rd)')+'">'+((cur.resultado-prev.resultado)>=0?'▲':'▼')+' '+fmt(Math.abs(cur.resultado-prev.resultado))+'</td></tr>';
  h+='</tbody>';

  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>DRE Mensal</h2><p>Demonstrativo de Resultado do Exercício — por competência</p></div>'+
  '<div class="ph-r">'+mnHTML()+'<button class="btn btpu sm" onclick="window.print()">🖨 Imprimir/PDF</button></div></div>'+
  '<div class="card"><div class="ch">'+
  '<div><div class="ct">DRE — '+mLbl()+'</div><div class="cs">Comparação com '+MONTHS[pm2]+' '+py2+'</div></div>'+
  '</div>'+
  '<table><thead><tr><th>Categoria</th><th class="tr2">'+mLbl()+'</th><th class="tr2">Mês Anterior</th><th class="tr2">Variação</th></tr></thead>'+
  h+'</table></div>';
}

// ── DFC ───────────────────────────────────────────────────
function rDFC(){
  var c=calc(curY,curM),es=getEs(curY,curM),res=c.rec-c.des;
  var rcc={},dcc={};
  centros.entrada.forEach(function(x){rcc[x]=0});
  centros.saida.forEach(function(x){dcc[x]=0});
  es.forEach(function(e){if(e.tipo==='entrada')rcc[e.cc]=(rcc[e.cc]||0)+e.valor;else if(e.tipo==='saida')dcc[e.cc]=(dcc[e.cc]||0)+e.valor});

  var h='<tbody><tr><td style="padding:13px 14px;font-size:14px;font-weight:700;color:var(--tx)">Saldo Inicial do Mês</td><td style="padding:13px 14px;text-align:right;font-size:15px;font-weight:700;color:#60a5fa">'+fmt(c.si)+'</td></tr>';
  h+='<tr class="dsh"><td colspan="2">1. Receitas (por data de pagamento)</td></tr>';
  centros.entrada.forEach(function(cc){var v=rcc[cc]||0;h+='<tr class="dit"><td>'+cc+'</td><td style="text-align:right;color:'+(v>0?'var(--gn)':'var(--md)')+'">'+fmt(v)+'</td></tr>';});
  h+='<tr class="dst"><td>Total de Receitas</td><td class="tr2 ap">'+fmt(c.rec)+'</td></tr>';
  h+='<tr class="dsh"><td colspan="2">2. Despesas (por data de pagamento)</td></tr>';
  centros.saida.forEach(function(cc){var v=dcc[cc]||0;h+='<tr class="dit"><td>'+cc+'</td><td style="text-align:right;color:'+(v>0?'var(--rd)':'var(--md)')+'">'+fmt(v)+'</td></tr>';});
  h+='<tr class="dst"><td>Total de Despesas</td><td class="tr2 an">'+fmt(c.des)+'</td></tr>';
  h+='<tr class="dsh"><td colspan="2">3. Resultado</td></tr>';
  h+='<tr class="dit"><td>Receitas - Despesas</td><td style="text-align:right;color:'+(res>=0?'var(--gn)':'var(--rd)')+'">'+(res>=0?'+':'')+fmt(res)+'</td></tr>';
  h+='<tr class="dtot"><td>Saldo Final do Mês</td><td style="text-align:right;color:'+(c.sf>=0?'var(--gn)':'var(--rd)')+'">'+fmt(c.sf)+'</td></tr></tbody>';

  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>DFC Mensal</h2><p>Demonstrativo de Fluxo de Caixa</p></div>'+
  '<div class="ph-r">'+mnHTML()+'<button class="btn btpu sm" onclick="window.print()">🖨 Imprimir/PDF</button></div></div>'+
  '<div class="card"><table>'+h+'</table></div>';
}

// ── SALDO ─────────────────────────────────────────────────
function rSaldo(){
  var now=new Date(),dm=mkey(now.getFullYear(),now.getMonth());
  var meses=[];
  for(var i=5;i>=-1;i--){var m=now.getMonth()-i,y=now.getFullYear();while(m<0){m+=12;y--}meses.push({y:y,m:m});}
  var rows=meses.map(function(x){
    var key=mkey(x.y,x.m);
    var manual=saldos.find(function(s){return s.mes===key});
    var pm=x.m-1,py=x.y;if(pm<0){pm=11;py--}
    var esP=getEs(py,pm);
    var recP=esP.filter(function(e){return e.tipo==='entrada'}).reduce(function(a,e){return a+e.valor},0);
    var desP=esP.filter(function(e){return e.tipo==='saida'}).reduce(function(a,e){return a+e.valor},0);
    var siP=saldos.find(function(s){return s.mes===mkey(py,pm)});
    var auto=(siP?siP.valor:0)+recP-desP;
    var val=manual?manual.valor:auto;
    var badge=manual?'<span class="tg tg-man" style="margin-right:6px">Manual</span>':'<span class="tg tg-auto" style="margin-right:6px">Auto</span>';
    var del=manual?'<button class="btn btd sm" onclick="delSaldo(\''+key+'\')">×</button>':'<span style="font-size:11px;color:var(--md)">—</span>';
    return'<tr><td>'+MONTHS[x.m]+' '+x.y+'</td><td>'+badge+(manual&&manual.obs?manual.obs:'Saldo do mês anterior')+'</td><td class="tr2 ap">'+fmt(val)+'</td><td>'+del+'</td></tr>';
  }).join('');

  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>Saldo Inicial</h2><p>Manual sobrepõe o automático</p></div></div>'+
  '<div class="g2">'+
  '<div class="card" style="margin:0"><div class="ch"><div class="ct">Definir Saldo Manual</div></div><div class="cb">'+
  '<div style="display:flex;flex-direction:column;gap:11px">'+
  '<div class="fg"><label>Mês/Ano</label><input type="month" id="si-mes" value="'+dm+'"></div>'+
  '<div class="fg"><label>Valor (R$)</label><input type="number" id="si-val" placeholder="0,00" step="0.01"></div>'+
  '<div class="fg"><label>Observação</label><input type="text" id="si-obs" placeholder="Opcional..."></div>'+
  '<button class="btn btp" onclick="saveSaldo()">Salvar Saldo Manual</button>'+
  '</div></div></div>'+
  '<div class="card" style="margin:0"><div class="ch"><div class="ct">Últimos 6 meses</div></div>'+
  '<table><thead><tr><th>Mês</th><th>Origem</th><th class="tr2">Saldo Inicial</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
function saveSaldo(){
  var mes=document.getElementById('si-mes').value,valor=parseFloat(document.getElementById('si-val').value),obs=document.getElementById('si-obs').value;
  if(!mes||isNaN(valor)){showToast('Preencha mês e valor','er');return}
  db.collection('saldos').doc(mes).set({mes:mes,valor:valor,obs:obs});
  document.getElementById('si-val').value='';document.getElementById('si-obs').value='';
  showToast('Saldo salvo!');
}
function delSaldo(mes){db.collection('saldos').doc(mes).delete();showToast('Removido')}

function addCC(tipo){
  var inp=document.getElementById(tipo==='entrada'?'cc-e':'cc-s'),nome=inp.value.trim();
  if(!nome){showToast('Digite um nome','er');return}
  if(centros[tipo].indexOf(nome)>=0){showToast('Já existe','er');return}
  centros[tipo].push(nome);inp.value='';
  db.collection('config').doc('centros').set(centros);showToast('Centro adicionado!');
}
function delCC(tipo,nome){
  if(!confirm('"'+nome+'" será removido. Continuar?'))return;
  centros[tipo]=centros[tipo].filter(function(c){return c!==nome});
  db.collection('config').doc('centros').set(centros);showToast('Removido');
}// ── MODAL LANÇAMENTO ──────────────────────────────────────
function openModal(t,id){
  editId=id||null;selTipo=t||'entrada';

  updTipo();updCC();updBancoSel();

    var e=entries.find(function(x){return x.id===id});if(!e)return;

      document.getElementById('ft-dt').value=e.date||today();
      document.getElementById('ft-vl').value=e.valor||'';
      document.getElementById('ft-ds').value=e.desc||'';
      document.getElementById('ft-ob').value=e.obs||'';
      document.getElementById('ft-us').value=e.usuario||curUser;
      setTimeout(function(){
        document.getElementById('ft-origem').value=e.contaOrigem||'';
        document.getElementById('ft-destino').value=e.contaDestino||'';
      },80);
    } else {
      document.getElementById('f-dt').value=e.date||today();
      document.getElementById('f-comp').value=e.comp||nowComp();
      document.getElementById('f-vl').value=e.valor||'';
      document.getElementById('f-ds').value=e.desc||'';
      document.getElementById('f-ob').value=e.obs||'';
      document.getElementById('f-us').value=e.usuario||curUser;
      setTimeout(function(){
        document.getElementById('f-cc').value=e.cc||'';
        document.getElementById('f-conta').value=e.conta||'';
      },80);

    document.getElementById('f-comp').value=nowComp();
    document.getElementById('f-vl').value='';
    document.getElementById('f-ds').value='';
    document.getElementById('f-ob').value='';
    document.getElementById('f-us').value=curUser;
    document.getElementById('ft-dt').value=today();
    document.getElementById('ft-vl').value='';
    document.getElementById('ft-ds').value='';
    document.getElementById('ft-ob').value='';
  }

}

function closeModal(){document.getElementById('modal').classList.remove('on');editId=null}
function setTipo(t){selTipo=t;updTipo();updCC();updBancoSel()}
function updTipo(){
  document.getElementById('tb-e').className='tb'+(selTipo==='entrada'?' te':'');
  document.getElementById('tb-s').className='tb'+(selTipo==='saida'?' ts':'');
  document.getElementById('tb-t').className='tb'+(selTipo==='transferencia'?' tt':'');

function updCC(){

function updBancoSel(){
  var opts=bancos.length?bancos.map(function(b){return'<option value="'+b.id+'">'+b.nome+'</option>'}).join(''):'<option value="">Sem contas</option>';
  var optsV='<option value="">Nenhuma</option>'+opts;

function saveEntry(){
  if(selTipo==='transferencia'){
    var dt=document.getElementById('ft-dt').value,vl=parseFloat(document.getElementById('ft-vl').value);
    var ds=document.getElementById('ft-ds').value.trim(),ob=document.getElementById('ft-ob').value;
    var us=document.getElementById('ft-us').value;
    var orig=document.getElementById('ft-origem').value,dest=document.getElementById('ft-destino').value;
    if(!dt||isNaN(vl)||vl<=0){showToast('Preencha data e valor','er');return}
    if(orig===dest){showToast('Origem e destino iguais','er');return}
    var desc=ds||(nomeBanco(orig)+' → '+nomeBanco(dest));
    if(editId){
      db.collection('entries').doc(editId).update({tipo:'transferencia',date:dt,valor:vl,desc:desc,conta:orig,contaOrigem:orig,contaDestino:dest,usuario:us,obs:ob,ts:Date.now()});
      closeModal();showToast('Transferência atualizada!');return;
    }
    db.collection('entries').add({tipo:'saida',date:dt,valor:vl,desc:desc,cc:'Transferência entre contas',conta:orig,contaOrigem:orig,contaDestino:dest,usuario:us,pagamento:'Transferência',obs:ob,ts:Date.now()});
    db.collection('entries').add({tipo:'entrada',date:dt,valor:vl,desc:desc,cc:'Transferência entre contas',conta:dest,contaOrigem:orig,contaDestino:dest,usuario:us,pagamento:'Transferência',obs:ob,ts:Date.now()+1});
    closeModal();showToast('Transferência registrada!');return;
  }
  var data=document.getElementById('f-dt').value;
  var comp=document.getElementById('f-comp').value;
  var valor=parseFloat(document.getElementById('f-vl').value);
  var desc=document.getElementById('f-ds').value.trim();
  var cc=document.getElementById('f-cc').value;
  var conta=document.getElementById('f-conta').value;
  var usuario=document.getElementById('f-us').value;
  var pagamento=document.getElementById('f-pg').value;
  var obs=document.getElementById('f-ob').value;
  if(!data||isNaN(valor)||valor<=0||!desc){showToast('Preencha data, descrição e valor','er');return}
  var payload={tipo:selTipo,date:data,comp:comp,valor:valor,desc:desc,cc:cc,conta:conta,usuario:usuario,pagamento:pagamento,obs:obs,ts:Date.now()};
  if(editId){db.collection('entries').doc(editId).update(payload);closeModal();showToast('Lançamento atualizado!');}
  else{db.collection('entries').add(payload);closeModal();showToast((selTipo==='entrada'?'Receita':'Despesa')+' lançada!');}
}

function setOrcTipo(t){
  orcTipo=t;
  document.getElementById('tb-os').className='tb'+(orcTipo==='saida'?' ts':'');
  document.getElementById('tb-oe').className='tb'+(orcTipo==='entrada'?' te':'');
  var lista=orcTipo==='entrada'?centros.entrada:centros.saida;
  document.getElementById('mo-cc').innerHTML=lista.map(function(c){return'<option value="'+c+'">'+c+'</option>'}).join('');
}
function closeModalOrc(){document.getElementById('modal-orc').classList.remove('on');editOrcId=null}
function editOrc(id){
  var c=orcamentos.find(function(x){return x.id===id});
  if(c)openModalOrc(c.tipo,id);
}
function saveOrc(){
  var desc=document.getElementById('mo-desc').value.trim();
  var val=parseFloat(document.getElementById('mo-val').value);
  var venc=document.getElementById('mo-venc').value;
  var comp=document.getElementById('mo-comp').value;
  var cc=document.getElementById('mo-cc').value;
  var obs=document.getElementById('mo-obs').value;
  var fixa=document.getElementById('mo-fixa').checked;
  if(!desc||isNaN(val)||!venc){showToast('Preencha descrição, valor e vencimento','er');return}
  var base={tipo:orcTipo,desc:desc,valor:val,vencimento:venc,comp:comp,cc:cc,obs:obs,fixa:fixa,pago:false,ts:Date.now()};
  if(editOrcId){
    db.collection('orcamentos').doc(editOrcId).update({desc:desc,valor:val,vencimento:venc,comp:comp,cc:cc,obs:obs});
    closeModalOrc();showToast('Conta atualizada!');return;
  }
  db.collection('orcamentos').add(base);
  if(fixa){
    for(var i=1;i<=11;i++){
      var nd=new Date(venc);nd.setMonth(nd.getMonth()+i);
      var nv=nd.toISOString().split('T')[0];
      var nc=mkey(nd.getFullYear(),nd.getMonth());
      db.collection('orcamentos').add(Object.assign({},base,{vencimento:nv,comp:nc,ts:Date.now()+i}));
    }
    showToast('Conta fixa criada para 12 meses!');
  } else {
    showToast('Conta salva!');
  }
  closeModalOrc();
}
function delOrc(id){if(!confirm('Remover esta conta?'))return;db.collection('orcamentos').doc(id).delete();showToast('Removido')}

// ── BAIXA ─────────────────────────────────────────────────
function openBaixa(id){
  var c=orcamentos.find(function(x){return x.id===id});if(!c)return;
  baixaId=id;
  document.getElementById('mbx-title').textContent=c.tipo==='saida'?'Dar Baixa — Pagamento':'Dar Baixa — Recebimento';
  document.getElementById('mbx-desc').textContent=c.desc;
  document.getElementById('mbx-prev').textContent=fmt(c.valor);
  document.getElementById('mbx-data').value=today();
  document.getElementById('mbx-val').value=c.valor;
  document.getElementById('mbx-obs').value='';
  updBancoSel();
  document.getElementById('modal-baixa').classList.add('on');
}
function closeModalBaixa(){document.getElementById('modal-baixa').classList.remove('on');baixaId=null}
function confirmarBaixa(){
  if(!baixaId)return;
  var c=orcamentos.find(function(x){return x.id===baixaId});if(!c)return;
  var dataPago=document.getElementById('mbx-data').value;
  var valorPago=parseFloat(document.getElementById('mbx-val').value);
  var pag=document.getElementById('mbx-pag').value;
  var obs=document.getElementById('mbx-obs').value;
  var conta=document.getElementById('mbx-conta').value;
  if(!dataPago||isNaN(valorPago)||valorPago<=0){showToast('Preencha data e valor','er');return}
  db.collection('orcamentos').doc(baixaId).update({pago:true,dataPago:dataPago,valorPago:valorPago,pagamento:pag,obsBaixa:obs});
  db.collection('entries').add({
    tipo:c.tipo==='saida'?'saida':'entrada',
    date:dataPago,comp:c.comp||nowComp(),
    valor:valorPago,desc:c.desc+' (baixa)',
    cc:c.cc,conta:conta,usuario:curUser,
    pagamento:pag,obs:obs||'Baixa automática',ts:Date.now()
  });
  closeModalBaixa();showToast('Baixa realizada e lançada no fluxo!');
}

// ── CHEQUES ───────────────────────────────────────────────
function rCheques(){
  var lista=cheques;
  if(filtroChq==='emitidos')lista=lista.filter(function(c){return c.tipo==='emitido'});
  else if(filtroChq==='recebidos')lista=lista.filter(function(c){return c.tipo==='recebido'});
  else if(filtroChq==='pendentes')lista=lista.filter(function(c){return c.status==='emitido'});
  else if(filtroChq==='compensados')lista=lista.filter(function(c){return c.status==='compensado'});
  else if(filtroChq==='devolvidos')lista=lista.filter(function(c){return c.status==='devolvido'||c.status==='cancelado'});

  var totEmit=cheques.filter(function(c){return c.tipo==='emitido'&&c.status==='emitido'}).reduce(function(a,c){return a+c.valor},0);
  var totRec=cheques.filter(function(c){return c.tipo==='recebido'&&c.status==='emitido'}).reduce(function(a,c){return a+c.valor},0);
  var totComp=cheques.filter(function(c){return c.status==='compensado'}).reduce(function(a,c){return a+(c.valorComp||c.valor)},0);

  function stTag(c){
    var s=getStatusCheque(c);
    if(s==='compensado')return'<span class="tg tg-comp">✓ Compensado</span>';
    if(s==='devolvido')return'<span class="tg tg-dev">Devolvido</span>';
    if(s==='cancelado')return'<span class="tg tg-canc">Cancelado</span>';
    if(s==='vencido')return'<span class="tg tg-atras">Vencido</span>';
    if(s==='vence')return'<span class="tg tg-vence">Vence em breve</span>';
    return'<span class="tg tg-emit">Emitido</span>';
  }

  var rows=lista.length?lista.map(function(c){
    var de=c.emissao?c.emissao.split('-').reverse().join('/'):'—';
    var dv=c.vencimento?c.vencimento.split('-').reverse().join('/'):'—';
    var tipoTag=c.tipo==='emitido'?'<span class="tg tg-s">Emitido</span>':'<span class="tg tg-e">Recebido</span>';
    var bDot=c.conta?'<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:50%;background:'+corBanco(c.conta)+'"></span>'+nomeBanco(c.conta)+'</span>':'—';
    var s=getStatusCheque(c);
    var btns='';
    if(s==='emitido'||s==='vencido'||s==='vence'){
      btns='<button class="btn btg sm" style="margin-right:4px" onclick="openModalComp(\''+c.id+'\')">✓ Comp.</button>'+
           '<button class="btn bty sm" style="margin-right:4px" onclick="marcarCheque(\''+c.id+'\',\'devolvido\')">↩</button>'+
           '<button class="btn bts sm" style="margin-right:4px" onclick="marcarCheque(\''+c.id+'\',\'cancelado\')">✕</button>';
    }
    btns+='<button class="btn btd sm" onclick="delCheque(\''+c.id+'\')">×</button>';
    return'<tr><td>'+tipoTag+'</td><td style="color:var(--tx);font-weight:500">'+c.favorecido+'</td><td>'+(c.desc||'—')+'</td><td>'+bDot+'</td><td>'+de+'</td><td>'+dv+'</td>'+
    '<td class="tr2 '+(c.tipo==='emitido'?'an':'ap')+'">'+(c.tipo==='emitido'?'-':'+')+fmt(c.valor)+'</td><td>'+stTag(c)+'</td><td>'+btns+'</td></tr>';
  }).join(''):emptyRow(9,'Nenhum cheque cadastrado');

  var fbtns=['todos','emitidos','recebidos','pendentes','compensados','devolvidos'].map(function(f){
    var lb={todos:'Todos',emitidos:'Emitidos',recebidos:'Recebidos',pendentes:'Pendentes',compensados:'Compensados',devolvidos:'Dev./Canc.'};
    return'<button class="fbtn'+(filtroChq===f?' on':'')+'" onclick="setFiltroChq(\''+f+'\')">'+lb[f]+'</button>';
  }).join('');

  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>Cheques</h2><p>Controle de cheques emitidos e recebidos</p></div>'+
  '<button class="btn btp sm" onclick="openModalCheque()">+ Novo Cheque</button></div>'+
  alertasHTML()+
  '<div class="sg sg3">'+
  '<div class="sc" style="border-top-color:var(--rd)"><div class="sl">Emitidos Pendentes</div><div class="sv an">'+fmt(totEmit)+'</div></div>'+
  '<div class="sc" style="border-top-color:var(--pu)"><div class="sl">A Receber</div><div class="sv apu">'+fmt(totRec)+'</div></div>'+
  '<div class="sc" style="border-top-color:var(--gn)"><div class="sl">Total Compensado</div><div class="sv ap">'+fmt(totComp)+'</div></div>'+
  '</div>'+
  '<div class="fbar">'+fbtns+'</div>'+
  '<div class="card"><table><thead><tr><th>Tipo</th><th>Favorecido/Emitente</th><th>Descrição</th><th>Conta</th><th>Emissão</th><th>Vencimento</th><th class="tr2">Valor</th><th>Status</th><th></th></tr></thead>'+
  '<tbody>'+rows+'</tbody></table></div>';
}
function setFiltroChq(f){filtroChq=f;render()}

function openModalCheque(){
  chequeTipo='emitido';
  ['ch-fav','ch-val','ch-desc','ch-obs'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('ch-emissao').value=today();
  document.getElementById('ch-venc').value=today();
  updBancoSel();updChequeTipoUI();
  document.getElementById('modal-cheque').classList.add('on');
}
function closeModalCheque(){document.getElementById('modal-cheque').classList.remove('on')}
function setChequeTipo(t){chequeTipo=t;updChequeTipoUI()}
function updChequeTipoUI(){
  document.getElementById('ctb-emit').className='ctb'+(chequeTipo==='emitido'?' on-s':'');
  document.getElementById('ctb-rec').className='ctb'+(chequeTipo==='recebido'?' on-e':'');
  document.getElementById('mch-title').textContent=chequeTipo==='emitido'?'Novo Cheque Emitido':'Novo Cheque Recebido';
}
function saveCheque(){
  var fav=document.getElementById('ch-fav').value.trim();
  var val=parseFloat(document.getElementById('ch-val').value);
  var emissao=document.getElementById('ch-emissao').value;
  var venc=document.getElementById('ch-venc').value;
  var conta=document.getElementById('ch-conta').value;
  var desc=document.getElementById('ch-desc').value;
  var obs=document.getElementById('ch-obs').value;
  if(!fav||isNaN(val)||!venc){showToast('Preencha favorecido, valor e vencimento','er');return}
  db.collection('cheques').add({tipo:chequeTipo,favorecido:fav,valor:val,emissao:emissao,vencimento:venc,conta:conta,desc:desc,obs:obs,status:'emitido',ts:Date.now()});
  closeModalCheque();showToast('Cheque salvo!');
}
function delCheque(id){if(!confirm('Remover este cheque?'))return;db.collection('cheques').doc(id).delete();showToast('Removido')}
function marcarCheque(id,status){if(!confirm('Marcar como '+status+'?'))return;db.collection('cheques').doc(id).update({status:status});showToast('Status atualizado')}

function openModalComp(id){
  var c=cheques.find(function(x){return x.id===id});if(!c)return;
  compId=id;
  document.getElementById('mcp-title').textContent=c.tipo==='emitido'?'Compensar Cheque Emitido':'Compensar Cheque Recebido';
  document.getElementById('mcp-desc').textContent=(c.tipo==='emitido'?'Para: ':'De: ')+c.favorecido+(c.desc?' — '+c.desc:'');
  document.getElementById('mcp-prev').textContent=fmt(c.valor);
  document.getElementById('mcp-data').value=today();
  document.getElementById('mcp-val').value=c.valor;
  document.getElementById('mcp-obs').value='';
  document.getElementById('modal-comp').classList.add('on');
}
function closeModalComp(){document.getElementById('modal-comp').classList.remove('on');compId=null}
function confirmarComp(){
  if(!compId)return;
  var c=cheques.find(function(x){return x.id===compId});if(!c)return;
  var data=document.getElementById('mcp-data').value;
  var val=parseFloat(document.getElementById('mcp-val').value);
  var obs=document.getElementById('mcp-obs').value;
  if(!data||isNaN(val)||val<=0){showToast('Preencha data e valor','er');return}
  db.collection('cheques').doc(compId).update({status:'compensado',dataComp:data,valorComp:val,obsComp:obs});
  db.collection('entries').add({
    tipo:c.tipo==='emitido'?'saida':'entrada',
    date:data,comp:mkey(new Date(data).getFullYear(),new Date(data).getMonth()),
    valor:val,desc:'Cheque compensado: '+c.favorecido+(c.desc?' — '+c.desc:''),
    cc:c.tipo==='emitido'?'Outras Despesas':'Outras Receitas',
    conta:c.conta||'',usuario:curUser,pagamento:'Cheque',
    obs:obs||'Compensação automática',ts:Date.now()
  });
  closeModalComp();showToast('Cheque compensado e lançado no fluxo!');
}

// ── BANCOS ────────────────────────────────────────────────
function openModalBanco(id){
  editBancoId=id||null;
  if(id){
    var b=bancos.find(function(x){return x.id===id});if(!b)return;
    document.getElementById('mb2-title').textContent='Editar Conta';
    document.getElementById('bc-nome').value=b.nome;
    document.getElementById('bc-tipo').value=b.tipo;
    document.getElementById('bc-cor').value=b.cor;
    document.getElementById('bc-saldo').value=b.saldoInicial||0;
    document.getElementById('bc-data').value=b.dataInicial||today();
  } else {
    document.getElementById('mb2-title').textContent='Nova Conta Bancária';
    document.getElementById('bc-nome').value='';
    document.getElementById('bc-saldo').value='0';
    document.getElementById('bc-data').value=today();
  }
  document.getElementById('modal-banco').classList.add('on');
}
function closeModalBanco(){document.getElementById('modal-banco').classList.remove('on');editBancoId=null}
function editBanco(id){openModalBanco(id)}
function saveBanco(){
  var nome=document.getElementById('bc-nome').value.trim();
  var tipo=document.getElementById('bc-tipo').value;
  var cor=document.getElementById('bc-cor').value;
  var saldoInicial=parseFloat(document.getElementById('bc-saldo').value)||0;
  var dataInicial=document.getElementById('bc-data').value;
  if(!nome){showToast('Digite o nome da conta','er');return}
  var data={nome:nome,tipo:tipo,cor:cor,saldoInicial:saldoInicial,dataInicial:dataInicial};
  if(editBancoId){db.collection('bancos').doc(editBancoId).update(data);}
  else{data.ts=Date.now();db.collection('bancos').add(data);}
  closeModalBanco();showToast(editBancoId?'Conta atualizada!':'Conta criada!');
}
function delBanco(id){if(!confirm('Remover esta conta?'))return;db.collection('bancos').doc(id).delete();showToast('Removido')}

// ── CHART ─────────────────────────────────────────────────
function mkChart(id,labs,rD,dD,type){
  if(charts[id])charts[id].destroy();
  var ctx=document.getElementById(id);if(!ctx)return;
  charts[id]=new Chart(ctx,{type:type,data:{labels:labs,datasets:[
    {label:'Receitas',data:rD,backgroundColor:type==='bar'?'rgba(16,185,129,.7)':undefined,borderColor:'#10b981',fill:type==='line',tension:.3,borderWidth:2,pointRadius:3,pointBackgroundColor:'#10b981',borderRadius:type==='bar'?4:0},
    {label:'Despesas',data:dD,backgroundColor:type==='bar'?'rgba(239,68,68,.7)':undefined,borderColor:'#ef4444',fill:type==='line',tension:.3,borderWidth:2,pointRadius:3,pointBackgroundColor:'#ef4444',borderRadius:type==='bar'?4:0}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#64748b',font:{size:11}}}},
    scales:{x:{ticks:{color:'#64748b',font:{size:11}},grid:{color:'rgba(30,45,69,.4)'},border:{color:'transparent'}},
    y:{ticks:{color:'#64748b',font:{size:11},callback:function(v){return'R$'+v.toLocaleString('pt-BR')}},grid:{color:'rgba(30,45,69,.4)'},border:{color:'transparent'}}}}});
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=(type==='er'?'✕ ':'✓ ')+msg;
  t.className='toast on '+(type||'ok');
  setTimeout(function(){t.className='toast'},2400);
}

// ── INIT ──────────────────────────────────────────────────
buildNav();render();
</script>
