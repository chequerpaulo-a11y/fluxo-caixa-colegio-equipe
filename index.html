<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFC — Colégio Equipe</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0e1a;color:#e2e8f0;font-size:14px;min-height:100vh}
header{background:#111827;border-bottom:1px solid #1e2d45;padding:13px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.lm{width:32px;height:32px;background:#2563eb;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.lt h1{font-size:14px;font-weight:600}
.lt span{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.hbts{display:flex;gap:7px;align-items:center}
.ubadge{display:flex;align-items:center;gap:5px;background:#1a2235;border:1px solid #1e2d45;border-radius:20px;padding:3px 10px 3px 3px;font-size:12px;color:#94a3b8;cursor:pointer}
.uav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;background:#2563eb}
.layout{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 58px)}
nav{background:#111827;border-right:1px solid #1e2d45;padding:16px 0}
.nl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#475569;padding:0 16px;margin:10px 0 3px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 16px;color:#94a3b8;cursor:pointer;font-size:13px;border-left:2px solid transparent;transition:all .15s}
.ni:hover{background:#1a2235;color:#e2e8f0}
.ni.on{background:rgba(37,99,235,.1);color:#60a5fa;border-left-color:#3b82f6;font-weight:600}
main{padding:24px;overflow-y:auto}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.ph h2{font-size:22px;font-weight:700;letter-spacing:-.01em}
.ph p{font-size:12px;color:#64748b;margin-top:2px}
.mnav{display:flex;align-items:center;gap:5px;background:#111827;border:1px solid #1e2d45;border-radius:8px;padding:4px 6px}
.mb{background:none;border:none;color:#64748b;cursor:pointer;padding:4px 8px;border-radius:5px;font-size:17px;line-height:1}
.mb:hover{background:#1a2235;color:#e2e8f0}
.ml{font-size:13px;font-weight:500;color:#e2e8f0;min-width:128px;text-align:center}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.sc{background:#111827;border:1px solid #1e2d45;border-radius:10px;padding:16px;border-top:2px solid #1e2d45}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:7px}
.sv{font-size:20px;font-weight:700}
.ss{font-size:11px;color:#64748b;margin-top:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin-bottom:14px}
.card{background:#111827;border:1px solid #1e2d45;border-radius:10px;overflow:hidden;margin-bottom:14px}
.ch{padding:13px 17px;border-bottom:1px solid #1e2d45;display:flex;align-items:center;justify-content:space-between}
.ct{font-size:13px;font-weight:600}
.cs{font-size:11px;color:#64748b;margin-top:2px}
.cb{padding:16px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;padding:7px 11px;border-bottom:1px solid #1e2d45}
td{padding:9px 11px;font-size:13px;color:#94a3b8;border-bottom:1px solid rgba(30,45,69,.35)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1a2235}
.tg{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.tg-e{background:rgba(16,185,129,.12);color:#10b981}
.tg-s{background:rgba(239,68,68,.12);color:#ef4444}
.ap{color:#10b981;font-weight:600}
.an{color:#ef4444;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:7px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btp{background:#2563eb;color:#fff}.btp:hover{background:#1d4ed8}
.bts{background:#1a2235;color:#94a3b8;border:1px solid #1e2d45}.bts:hover{color:#e2e8f0}
.btd{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.sm{padding:5px 10px;font-size:12px}
input,select{background:#1a2235;border:1px solid #1e2d45;border-radius:7px;color:#e2e8f0;padding:9px 12px;font-family:inherit;font-size:13px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus{border-color:#2563eb}
select option{background:#111827}
label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;margin-bottom:4px;display:block}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.f2{grid-column:span 2}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.mo.on{display:flex}
.mbox{background:#111827;border:1px solid #1e2d45;border-radius:14px;width:450px;max-height:90vh;overflow-y:auto}
.mh{padding:17px 21px;border-bottom:1px solid #1e2d45;display:flex;align-items:center;justify-content:space-between}
.mh h3{font-size:17px;font-weight:700}
.mcl{padding:21px}
.mf{padding:13px 21px;border-top:1px solid #1e2d45;display:flex;justify-content:flex-end;gap:7px}
.tsel{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.tb{padding:10px;border-radius:7px;border:1.5px solid #1e2d45;background:#1a2235;color:#94a3b8;cursor:pointer;text-align:center;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
.tb.te{background:rgba(16,185,129,.1);border-color:#10b981;color:#10b981}
.tb.ts{background:rgba(239,68,68,.1);border-color:#ef4444;color:#ef4444}
.toast{position:fixed;bottom:20px;right:20px;background:#111827;border:1px solid #1e2d45;border-radius:9px;padding:11px 17px;font-size:13px;color:#e2e8f0;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s ease;pointer-events:none}
.toast.on{transform:translateY(0);opacity:1}
.toast.ok{border-left:3px solid #10b981}
.toast.er{border-left:3px solid #ef4444}
.empty{text-align:center;padding:36px 20px;color:#64748b}
.empty div{font-size:28px;margin-bottom:8px}
.pr{margin-bottom:10px}
.pi{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.pb{height:4px;background:#1e2d45;border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .5s}
.dsh td{background:#1a2235;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#64748b;padding:7px 14px}
.dit td{padding:8px 14px 8px 26px;font-size:13px;color:#94a3b8;border-bottom:1px solid rgba(30,45,69,.3)}
.dst td{padding:9px 14px;font-size:13px;font-weight:700;border-top:1px solid #1e2d45;border-bottom:1px solid #1e2d45}
.dtot td{padding:13px 14px;font-size:15px;font-weight:700;background:rgba(37,99,235,.08);border-top:2px solid #2563eb}
.tr2{text-align:right}
.bdg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em}
.bdg-e{background:rgba(16,185,129,.15);color:#10b981}
.bdg-s{background:rgba(239,68,68,.15);color:#ef4444}
.ndiv{height:1px;background:#1e2d45;margin:8px 16px}
.row{display:flex}.aic{align-items:center}.g8{gap:8px}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="lm">CE</div>
    <div class="lt"><h1>Colégio Equipe</h1><span>Fluxo de Caixa</span></div>
  </div>
  <div class="hbts">
    <div class="ubadge" onclick="switchUser()">
      <div class="uav" id="uav">P</div>
      <span id="uname">Paulo</span> ▾
    </div>
    <button class="btn btp sm" onclick="openModal()">+ Lançamento</button>
  </div>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>
<div class="mo" id="modal" onclick="mOutside(event)">
  <div class="mbox">
    <div class="mh"><h3>Novo Lançamento</h3><span style="cursor:pointer;font-size:20px;color:#64748b" onclick="closeModal()">x</span></div>
    <div class="mcl">
      <div class="tsel">
        <button class="tb te" id="tb-e" onclick="setTipo('entrada')">Receita</button>
        <button class="tb" id="tb-s" onclick="setTipo('saida')">Despesa</button>
      </div>
      <div class="fgrid">
        <div class="fg"><label>Data</label><input type="date" id="f-dt"></div>
        <div class="fg"><label>Valor (R$)</label><input type="number" id="f-vl" placeholder="0,00" step="0.01" min="0"></div>
        <div class="fg f2"><label>Descricao</label><input type="text" id="f-ds" placeholder="Ex: Mensalidades de marco..."></div>
        <div class="fg f2"><label>Centro de Custo</label><select id="f-cc"></select></div>
        <div class="fg"><label>Usuario</label><select id="f-us"><option>Paulo</option><option>Joao</option></select></div>
        <div class="fg"><label>Pagamento</label><select id="f-pg"><option>PIX</option><option>Dinheiro</option><option>Cartao Debito</option><option>Cartao Credito</option><option>Transferencia</option><option>Boleto</option></select></div>
        <div class="fg f2"><label>Observacoes</label><input type="text" id="f-ob" placeholder="Opcional..."></div>
      </div>
    </div>
    <div class="mf">
      <button class="btn bts sm" onclick="closeModal()">Cancelar</button>
      <button class="btn btp sm" onclick="saveEntry()">Salvar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var MONTHS=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DEF_E=['Receita de Mensalidade','Receita de Matricula','Receita de Material Didatico','Receita de Alimentacao/Cantina','Receita de Eventos','Receita de Cursos Extracurriculares','Outras Receitas'];
var DEF_S=['Salario Direcao','Salario Coordenacao','Salario Professores','Salario Func. Administrativos','Salario Func. de Apoio','Encargos/Beneficios FGTS INSS VT','Aluguel','Energia Eletrica','Agua e Esgoto','Telefone Internet','Transporte Combustivel','Material de Limpeza','Material de Expediente','Material Pedagogico','Manutencao Predial','Manutencao de Equipamentos','Marketing e Publicidade','Contabilidade Honorarios','Impostos e Taxas','Seguros','Softwares e Sistemas','Merenda Escolar','Uniformes','Outras Despesas'];

function ld(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

var entries=ld('ce4-ent',[]),saldos=ld('ce4-sal',[]),centros=ld('ce4-cen',{entrada:DEF_E.slice(),saida:DEF_S.slice()});
var curM=new Date().getMonth(),curY=new Date().getFullYear(),curUser='Paulo',selTipo='entrada',curView='dashboard';
var charts={};

function saveAll(){sv('ce4-ent',entries);sv('ce4-sal',saldos);sv('ce4-cen',centros)}
function mkey(y,m){return y+'-'+(m+1<10?'0':'')+(m+1)}
function fmt(v){return'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function today(){return new Date().toISOString().split('T')[0]}
function mLbl(){return MONTHS[curM]+' '+curY}

var NAV=[
  {g:'Visao Geral',i:[{id:'dashboard',l:'Dashboard'}]},
  {g:'Registros',i:[{id:'lancamentos',l:'Lancamentos'},{id:'entradas',l:'Receitas'},{id:'saidas',l:'Despesas'}]},
  {g:'Relatorios',i:[{id:'dfc',l:'DFC Mensal'},{id:'anual',l:'Visao Anual'}]},
  {g:'Config',i:[{id:'saldo',l:'Saldo Inicial'},{id:'centros',l:'Centros de Custo'}]}
];

function buildNav(){
  var h='';
  for(var g=0;g<NAV.length;g++){
    h+='<div class="nl">'+NAV[g].g+'</div>';
    for(var i=0;i<NAV[g].i.length;i++){
      var n=NAV[g].i[i];
      h+='<div class="ni'+(n.id===curView?' on':'')+'" onclick="goTo(\''+n.id+'\')">'+n.l+'</div>';
    }
    h+='<div class="ndiv"></div>';
  }
  document.getElementById('nav').innerHTML=h;
}
function goTo(v){curView=v;buildNav();render()}

function getEs(y,m){return entries.filter(function(e){return e.date&&e.date.indexOf(mkey(y,m))===0})}
function getSI(y,m){var s=saldos.find(function(s){return s.mes===mkey(y,m)});return s?s.valor:0}
function calc(y,m){
  var es=getEs(y,m);
  var rec=0,des=0;
  for(var i=0;i<es.length;i++){if(es[i].tipo==='entrada')rec+=es[i].valor;else des+=es[i].valor}
  var si=getSI(y,m);
  return{rec:rec,des:des,si:si,sf:si+rec-des}
}
function chM(d){curM+=d;if(curM<0){curM=11;curY--}if(curM>11){curM=0;curY++}render()}
function switchUser(){
  curUser=curUser==='Paulo'?'Joao':'Paulo';
  var av=document.getElementById('uav');
  av.textContent=curUser[0];
  av.style.background=curUser==='Paulo'?'#2563eb':'#7c3aed';
  document.getElementById('uname').textContent=curUser;
  var fu=document.getElementById('f-us');if(fu)fu.value=curUser;
}
function mnHTML(){return'<div class="mnav"><button class="mb" onclick="chM(-1)">&#8249;</button><span class="ml">'+mLbl()+'</span><button class="mb" onclick="chM(1)">&#8250;</button></div>'}

function render(){
  var map={dashboard:rDash,lancamentos:rLanc,entradas:function(){rTipo('entrada')},saidas:function(){rTipo('saida')},dfc:rDFC,anual:rAnual,saldo:rSaldo,centros:rCentros};
  if(map[curView])map[curView]();
}

function rDash(){
  var c=calc(curY,curM),es=getEs(curY,curM),res=c.rec-c.des;
  var labs=[],rA=[],dA=[];
  for(var i=5;i>=0;i--){var m=curM-i,y=curY;while(m<0){m+=12;y--}var cc=calc(y,m);labs.push(MONTHS[m].slice(0,3));rA.push(cc.rec);dA.push(cc.des)}
  var rcc={},dcc={};
  for(var j=0;j<es.length;j++){if(es[j].tipo==='entrada')rcc[es[j].cc]=(rcc[es[j].cc]||0)+es[j].valor;else dcc[es[j].cc]=(dcc[es[j].cc]||0)+es[j].valor}
  var rT=0,dT=0;
  for(var k in rcc)rT+=rcc[k];for(var k in dcc)dT+=dcc[k];
  var topR=Object.entries(rcc).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
  var topD=Object.entries(dcc).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
  var l8=[].concat(entries).sort(function(a,b){return b.id-a.id}).slice(0,8);
  var eCount=es.filter(function(e){return e.tipo==='entrada'}).length;
  var sCount=es.filter(function(e){return e.tipo==='saida'}).length;
  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>Dashboard</h2><p>Visao executiva do caixa</p></div>'+mnHTML()+'</div>'+
  '<div class="sg">'+
  '<div class="sc" style="border-top-color:#3b82f6"><div class="sl">Saldo Inicial</div><div class="sv">'+fmt(c.si)+'</div><div class="ss">Inicio do mes</div></div>'+
  '<div class="sc" style="border-top-color:#10b981"><div class="sl">Total Receitas</div><div class="sv ap">'+fmt(c.rec)+'</div><div class="ss">'+eCount+' lancamentos</div></div>'+
  '<div class="sc" style="border-top-color:#ef4444"><div class="sl">Total Despesas</div><div class="sv an">'+fmt(c.des)+'</div><div class="ss">'+sCount+' lancamentos</div></div>'+
  '<div class="sc" style="border-top-color:#f59e0b"><div class="sl">Saldo Final</div><div class="sv" style="color:'+(c.sf>=0?'#10b981':'#ef4444')+'">'+fmt(c.sf)+'</div><div class="ss">'+(res>=0?'+ ':'-')+fmt(Math.abs(res))+'</div></div>'+
  '</div>'+
  '<div class="g3">'+
  '<div class="card" style="margin:0"><div class="ch"><div><div class="ct">Evolucao Mensal</div><div class="cs">Ultimos 6 meses</div></div></div><div class="cb"><canvas id="ch-ev" height="185"></canvas></div></div>'+
  '<div class="card" style="margin:0"><div class="ch"><div class="ct">Receitas por Centro</div></div><div class="cb">'+ccP(topR,rT,'#10b981')+'</div></div>'+
  '<div class="card" style="margin:0"><div class="ch"><div class="ct">Despesas por Centro</div></div><div class="cb">'+ccP(topD,dT,'#ef4444')+'</div></div>'+
  '</div>'+
  '<div class="card"><div class="ch"><div class="ct">Ultimos Lancamentos</div></div>'+
  '<table><thead><tr><th>Data</th><th>Descricao</th><th>Centro</th><th>Usuario</th><th>Tipo</th><th class="tr2">Valor</th></tr></thead>'+
  '<tbody>'+(l8.length?l8.map(function(e){return row(e,false)}).join(''):'<tr><td colspan="6"><div class="empty"><div>&#x1F4CB;</div>Nenhum lancamento ainda</div></td></tr>')+'</tbody></table></div>';
  mkChart('ch-ev',labs,rA,dA,'bar');
}

function ccP(items,total,color){
  if(!items.length)return'<div class="empty"><div>&#x1F4CA;</div>Sem dados</div>';
  return items.map(function(item){
    var pct=total>0?(item[1]/total*100).toFixed(0):0;
    return'<div class="pr"><div class="pi"><span style="color:#94a3b8">'+item[0]+'</span><span style="color:'+color+';font-weight:600">'+fmt(item[1])+'</span></div><div class="pb"><div class="pf" style="width:'+pct+'%;background:'+color+'"></div></div></div>';
  }).join('');
}

function rLanc(){
  var es=getEs(curY,curM).sort(function(a,b){return b.date.localeCompare(a.date)});
  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>Lancamentos</h2><p>Todos os registros do periodo</p></div>'+
  '<div class="row aic g8">'+mnHTML()+'<button class="btn btp sm" onclick="openModal()">+ Novo</button></div></div>'+
  '<div class="card"><table><thead><tr><th>Data</th><th>Descricao</th><th>Centro</th><th>Usuario</th><th>Tipo</th><th class="tr2">Valor</th><th></th></tr></thead>'+
  '<tbody>'+(es.length?es.map(function(e){return row(e,true)}).join(''):'<tr><td colspan="7"><div class="empty"><div>&#x1F4CB;</div>Sem lancamentos</div></td></tr>')+'</tbody></table></div>';
}

function rTipo(tipo){
  var lb=tipo==='entrada'?'Receitas':'Despesas';
  var es=getEs(curY,curM).filter(function(e){return e.tipo===tipo}).sort(function(a,b){return b.date.localeCompare(a.date)});
  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>'+lb+'</h2><p>'+(tipo==='entrada'?'Entradas':'Saidas')+' do periodo</p></div>'+
  '<div class="row aic g8">'+mnHTML()+'<button class="btn btp sm" onclick="openModal(\''+tipo+'\')">+ '+(lb.slice(0,-1))+'</button></div></div>'+
  '<div class="card"><table><thead><tr><th>Data</th><th>Descricao</th><th>Centro</th><th>Usuario</th><th class="tr2">Valor</th><th></th></tr></thead>'+
  '<tbody>'+(es.length?es.map(function(e){return rowT(e)}).join(''):'<tr><td colspan="6"><div class="empty"><div>&#x1F4CB;</div>Sem lancamentos</div></td></tr>')+'</tbody></table></div>';
}

function row(e,del){
  var d=e.date?e.date.split('-').reverse().join('/'):'-';
  var uc=e.usuario==='Paulo'?'#60a5fa':'#a78bfa';
  var v=e.tipo==='entrada'?'<span class="ap">+'+fmt(e.valor)+'</span>':'<span class="an">-'+fmt(e.valor)+'</span>';
  var tg=e.tipo==='entrada'?'<span class="tg tg-e">Receita</span>':'<span class="tg tg-s">Despesa</span>';
  var db=del?'<td><button class="btn btd sm" onclick="delE('+e.id+')">x</button></td>':'';
  return'<tr><td>'+d+'</td><td style="color:#e2e8f0;font-weight:500">'+(e.desc||'-')+'</td><td>'+(e.cc||'-')+'</td><td style="color:'+uc+';font-weight:500">'+e.usuario+'</td><td>'+tg+'</td><td class="tr2">'+v+'</td>'+db+'</tr>';
}
function rowT(e){
  var d=e.date?e.date.split('-').reverse().join('/'):'-';
  var uc=e.usuario==='Paulo'?'#60a5fa':'#a78bfa';
  var v=e.tipo==='entrada'?'<span class="ap">+'+fmt(e.valor)+'</span>':'<span class="an">-'+fmt(e.valor)+'</span>';
  return'<tr><td>'+d+'</td><td style="color:#e2e8f0;font-weight:500">'+(e.desc||'-')+'</td><td>'+(e.cc||'-')+'</td><td style="color:'+uc+';font-weight:500">'+e.usuario+'</td><td class="tr2">'+v+'</td><td><button class="btn btd sm" onclick="delE('+e.id+')">x</button></td></tr>';
}

function rDFC(){
  var c=calc(curY,curM),es=getEs(curY,curM),rcc={},dcc={};
  for(var i=0;i<centros.entrada.length;i++)rcc[centros.entrada[i]]=0;
  for(var i=0;i<centros.saida.length;i++)dcc[centros.saida[i]]=0;
  for(var i=0;i<es.length;i++){if(es[i].tipo==='entrada')rcc[es[i].cc]=(rcc[es[i].cc]||0)+es[i].valor;else dcc[es[i].cc]=(dcc[es[i].cc]||0)+es[i].valor}
  var res=c.rec-c.des;
  var r='<tr><td style="padding:13px 14px;font-size:14px;font-weight:700">Saldo Inicial do Mes</td><td style="padding:13px 14px;text-align:right;font-size:15px;font-weight:700;color:#60a5fa">'+fmt(c.si)+'</td></tr>';
  r+='<tr class="dsh"><td colspan="2">1. Receitas</td></tr>';
  for(var i=0;i<centros.entrada.length;i++){var v=rcc[centros.entrada[i]]||0;r+='<tr class="dit"><td>'+centros.entrada[i]+'</td><td style="text-align:right;color:'+(v>0?'#10b981':'#475569')+'">'+fmt(v)+'</td></tr>'}
  r+='<tr class="dst"><td>Total de Receitas</td><td style="text-align:right;color:#10b981">'+fmt(c.rec)+'</td></tr>';
  r+='<tr class="dsh"><td colspan="2">2. Despesas</td></tr>';
  for(var i=0;i<centros.saida.length;i++){var v=dcc[centros.saida[i]]||0;r+='<tr class="dit"><td>'+centros.saida[i]+'</td><td style="text-align:right;color:'+(v>0?'#ef4444':'#475569')+'">'+fmt(v)+'</td></tr>'}
  r+='<tr class="dst"><td>Total de Despesas</td><td style="text-align:right;color:#ef4444">'+fmt(c.des)+'</td></tr>';
  r+='<tr class="dsh"><td colspan="2">3. Resultado</td></tr>';
  r+='<tr class="dit"><td>Receitas - Despesas</td><td style="text-align:right;color:'+(res>=0?'#10b981':'#ef4444')+'">'+(res>=0?'+':'')+fmt(res)+'</td></tr>';
  r+='<tr class="dtot"><td>Saldo Final do Mes</td><td style="text-align:right;font-size:19px;color:'+(c.sf>=0?'#10b981':'#ef4444')+'">'+fmt(c.sf)+'</td></tr>';
  document.getElementById('main').innerHTML='<div class="ph"><div><h2>DFC Mensal</h2><p>Demonstrativo de Fluxo de Caixa</p></div>'+mnHTML()+'</div><div class="card"><table>'+r+'</table></div>';
}

function rAnual(){
  var ay=parseInt((document.getElementById('aySel')||{value:curY}).value||curY);
  var labs=[],rA=[],dA=[],rows='';
  for(var m=0;m<12;m++){
    var c=calc(ay,m),res=c.rec-c.des;
    labs.push(MONTHS[m].slice(0,3));rA.push(c.rec);dA.push(c.des);
    rows+='<tr><td>'+MONTHS[m]+'</td><td class="tr2">'+fmt(c.si)+'</td><td class="tr2 ap">'+fmt(c.rec)+'</td><td class="tr2 an">'+fmt(c.des)+'</td><td class="tr2" style="color:'+(res>=0?'#10b981':'#ef4444')+';font-weight:600">'+(res>=0?'+':'')+fmt(res)+'</td><td class="tr2" style="color:'+(c.sf>=0?'#10b981':'#ef4444')+';font-weight:700">'+fmt(c.sf)+'</td></tr>';
  }
  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>Visao Anual</h2><p>Consolidado por mes</p></div>'+
  '<select id="aySel" onchange="rAnual()" style="background:#1a2235;border:1px solid #1e2d45;border-radius:7px;color:#e2e8f0;padding:6px 11px;font-family:inherit;font-size:13px;cursor:pointer">'+
  [2024,2025,2026,2027].map(function(y){return'<option'+(y===ay?' selected':'')+'>'+y+'</option>'}).join('')+
  '</select></div>'+
  '<div class="card"><div class="ch"><div class="ct">Receitas vs Despesas '+ay+'</div></div><div class="cb"><canvas id="ch-an" height="220"></canvas></div></div>'+
  '<div class="card"><table><thead><tr><th>Mes</th><th class="tr2">Saldo Inicial</th><th class="tr2">Receitas</th><th class="tr2">Despesas</th><th class="tr2">Resultado</th><th class="tr2">Saldo Final</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  mkChart('ch-an',labs,rA,dA,'line');
}

function rSaldo(){
  var now=new Date(),dm=mkey(now.getFullYear(),now.getMonth());
  var sorted=[].concat(saldos).sort(function(a,b){return b.mes.localeCompare(a.mes)});
  var sRows=sorted.length?sorted.map(function(s){
    var parts=s.mes.split('-');return'<tr><td>'+MONTHS[parseInt(parts[1])-1]+' '+parts[0]+'</td><td>'+(s.obs||'-')+'</td><td class="tr2 ap">'+fmt(s.valor)+'</td><td><button class="btn btd sm" onclick="delSaldo(\''+s.mes+'\')">x</button></td></tr>';
  }).join(''):'<tr><td colspan="4"><div class="empty"><div>&#x1F4B0;</div>Nenhum saldo</div></td></tr>';
  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>Saldo Inicial</h2><p>Configure o saldo de abertura por mes</p></div></div>'+
  '<div class="g2">'+
  '<div class="card" style="margin:0"><div class="ch"><div class="ct">Definir Saldo</div></div><div class="cb"><div style="display:flex;flex-direction:column;gap:11px">'+
  '<div class="fg"><label>Mes/Ano</label><input type="month" id="si-mes" value="'+dm+'"></div>'+
  '<div class="fg"><label>Valor (R$)</label><input type="number" id="si-val" placeholder="0,00" step="0.01"></div>'+
  '<div class="fg"><label>Observacao</label><input type="text" id="si-obs" placeholder="Opcional..."></div>'+
  '<button class="btn btp" onclick="saveSaldo()">Salvar Saldo</button></div></div></div>'+
  '<div class="card" style="margin:0"><div class="ch"><div class="ct">Saldos Cadastrados</div></div>'+
  '<table><thead><tr><th>Mes</th><th>Obs</th><th class="tr2">Valor</th><th></th></tr></thead><tbody>'+sRows+'</tbody></table></div></div>';
}
function saveSaldo(){
  var mes=document.getElementById('si-mes').value,valor=parseFloat(document.getElementById('si-val').value),obs=document.getElementById('si-obs').value;
  if(!mes||isNaN(valor)){showToast('Preencha mes e valor','er');return}
  saldos=saldos.filter(function(s){return s.mes!==mes});saldos.push({mes:mes,valor:valor,obs:obs});saveAll();rSaldo();showToast('Saldo salvo!');
}
function delSaldo(mes){saldos=saldos.filter(function(s){return s.mes!==mes});saveAll();rSaldo();showToast('Removido')}

function rCentros(){
  function mkR(tipo){
    var isE=tipo==='entrada';
    if(!centros[tipo].length)return'<tr><td colspan="4"><div class="empty"><div>&#x1F5C2;</div>Nenhum centro</div></td></tr>';
    return centros[tipo].map(function(n,i){
      return'<tr><td style="color:#475569;width:30px">'+(i+1)+'</td><td style="color:#e2e8f0;font-weight:500">'+n+'</td><td><span class="tg '+(isE?'tg-e':'tg-s')+'">'+(isE?'Receita':'Despesa')+'</span></td><td><button class="btn btd sm" onclick="delCC(\''+tipo+'\',\''+n.replace(/\'/g,"\\'")+'\')"  >x</button></td></tr>';
    }).join('');
  }
  document.getElementById('main').innerHTML=
  '<div class="ph"><div><h2>Centros de Custo</h2><p>Gerencie as categorias</p></div></div>'+
  '<div class="g2">'+
  '<div>'+
  '<div class="card"><div class="ch"><div class="ct">Adicionar Receita</div><span class="bdg bdg-e">Receita</span></div><div class="cb">'+
  '<div class="row g8"><input type="text" id="cc-e" placeholder="Nome do centro..." style="flex:1" onkeydown="if(event.key===\'Enter\')addCC(\'entrada\')"><button class="btn btp sm" onclick="addCC(\'entrada\')">Adicionar</button></div></div></div>'+
  '<div class="card"><div class="ch"><div class="ct">Receitas ('+centros.entrada.length+')</div></div>'+
  '<table><thead><tr><th>#</th><th>Nome</th><th>Tipo</th><th></th></tr></thead><tbody>'+mkR('entrada')+'</tbody></table></div>'+
  '</div>'+
  '<div>'+
  '<div class="card"><div class="ch"><div class="ct">Adicionar Despesa</div><span class="bdg bdg-s">Despesa</span></div><div class="cb">'+
  '<div class="row g8"><input type="text" id="cc-s" placeholder="Nome do centro..." style="flex:1" onkeydown="if(event.key===\'Enter\')addCC(\'saida\')"><button class="btn btp sm" onclick="addCC(\'saida\')">Adicionar</button></div></div></div>'+
  '<div class="card"><div class="ch"><div class="ct">Despesas ('+centros.saida.length+')</div></div>'+
  '<table><thead><tr><th>#</th><th>Nome</th><th>Tipo</th><th></th></tr></thead><tbody>'+mkR('saida')+'</tbody></table></div>'+
  '</div></div>';
}
function addCC(tipo){
  var inp=document.getElementById(tipo==='entrada'?'cc-e':'cc-s');
  var nome=inp.value.trim();
  if(!nome){showToast('Digite um nome','er');return}
  if(centros[tipo].indexOf(nome)>=0){showToast('Ja existe','er');return}
  centros[tipo].push(nome);inp.value='';saveAll();rCentros();showToast('Centro adicionado!');
}
function delCC(tipo,nome){
  var emUso=entries.some(function(e){return e.tipo===tipo&&e.cc===nome});
  if(emUso&&!confirm('"'+nome+'" esta em uso. Remover mesmo assim?'))return;
  centros[tipo]=centros[tipo].filter(function(c){return c!==nome});saveAll();rCentros();showToast('Removido');
}

function openModal(t){
  selTipo=t||'entrada';updTipo();updCC();
  document.getElementById('f-dt').value=today();
  document.getElementById('f-vl').value='';document.getElementById('f-ds').value='';document.getElementById('f-ob').value='';
  document.getElementById('f-us').value=curUser;
  document.getElementById('modal').classList.add('on');
}
function closeModal(){document.getElementById('modal').classList.remove('on')}
function mOutside(e){if(e.target===document.getElementById('modal'))closeModal()}
function setTipo(t){selTipo=t;updTipo();updCC()}
function updTipo(){
  document.getElementById('tb-e').className='tb'+(selTipo==='entrada'?' te':'');
  document.getElementById('tb-s').className='tb'+(selTipo==='saida'?' ts':'');
}
function updCC(){
  var sel=document.getElementById('f-cc');
  sel.innerHTML=centros[selTipo].map(function(c){return'<option value="'+c+'">'+c+'</option>'}).join('');
}
function saveEntry(){
  var data=document.getElementById('f-dt').value,valor=parseFloat(document.getElementById('f-vl').value),desc=document.getElementById('f-ds').value.trim(),cc=document.getElementById('f-cc').value,usuario=document.getElementById('f-us').value,pagamento=document.getElementById('f-pg').value,obs=document.getElementById('f-ob').value;
  if(!data||isNaN(valor)||valor<=0||!desc){showToast('Preencha data, descricao e valor','er');return}
  entries.push({id:Date.now(),tipo:selTipo,date:data,valor:valor,desc:desc,cc:cc,usuario:usuario,pagamento:pagamento,obs:obs});
  saveAll();closeModal();render();showToast((selTipo==='entrada'?'Receita':'Despesa')+' lancada!');
}
function delE(id){if(!confirm('Remover?'))return;entries=entries.filter(function(e){return e.id!==id});saveAll();render();showToast('Removido')}

function mkChart(id,labs,rD,dD,type){
  if(charts[id])charts[id].destroy();
  var ctx=document.getElementById(id);if(!ctx)return;
  charts[id]=new Chart(ctx,{type:type,data:{labels:labs,datasets:[
    {label:'Receitas',data:rD,backgroundColor:type==='bar'?'rgba(16,185,129,.7)':undefined,borderColor:'#10b981',fill:type==='line',tension:.3,borderWidth:2,pointRadius:3,pointBackgroundColor:'#10b981',borderRadius:type==='bar'?4:0},
    {label:'Despesas',data:dD,backgroundColor:type==='bar'?'rgba(239,68,68,.7)':undefined,borderColor:'#ef4444',fill:type==='line',tension:.3,borderWidth:2,pointRadius:3,pointBackgroundColor:'#ef4444',borderRadius:type==='bar'?4:0}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748b',font:{size:11}}}},scales:{x:{ticks:{color:'#64748b',font:{size:11}},grid:{color:'rgba(30,45,69,.4)'},border:{color:'transparent'}},y:{ticks:{color:'#64748b',font:{size:11},callback:function(v){return'R$'+v.toLocaleString('pt-BR')}},grid:{color:'rgba(30,45,69,.4)'},border:{color:'transparent'}}}}});
}

function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=(type==='er'?'x ':'ok ')+msg;
  t.className='toast on '+(type||'ok');
  setTimeout(function(){t.className='toast'},2400);
}

buildNav();render();
</script>
</body>
</html>
